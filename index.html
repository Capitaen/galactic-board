  state.fleetMotions = state.fleetMotions.filter((entry) => entry.fleetId !== fleetId);
}

function buildFleetTravelRuntime(motion, nowMs = Date.now()) {
  const sourcePlanet = planetIndex.get(motion?.sourcePlanetId);
  const targetPlanet = planetIndex.get(motion?.targetPlanetId);
  if (!sourcePlanet || !targetPlanet) return null;
  const plan = findFleetTravelPlan(sourcePlanet.id, targetPlanet.id);
  if (!plan || plan.points.length < 2 || plan.totalLength <= 0) return null;
  const startedAtMs = Number(motion?.startedAtMs) || nowMs;
  const durationMs = Math.max(1000, Number(motion?.durationMs) || Math.max(6000, (plan.totalLength / FLEET_TRAVEL_REFERENCE_DISTANCE) * FLEET_TRAVEL_REFERENCE_DURATION_MS));
  const elapsed = Math.max(0, nowMs - startedAtMs);
  const movementElapsed = Math.max(0, elapsed - FLEET_HYPERSPACE_START_DELAY_MS);
  const progress = clamp(movementElapsed / durationMs, 0, 1);
  const distance = plan.totalLength * progress;
  return {
    fleetId: String(motion.fleetId || '').trim(),
    sourcePlanetId: sourcePlanet.id,
    sourcePlanetName: motion?.sourcePlanetName || sourcePlanet.name,
    targetPlanetId: targetPlanet.id,
    targetPlanetName: motion?.targetPlanetName || targetPlanet.name,
    startedAtMs,
    durationMs,
    totalLength: plan.totalLength,
    points: plan.points,
    currentPosition: samplePolylineAtDistance(plan.points, distance),
    finishAudioPlayed: elapsed >= Math.max(FLEET_HYPERSPACE_START_DELAY_MS, (durationMs + FLEET_HYPERSPACE_START_DELAY_MS) - FLEET_HYPERSPACE_FINISH_LEAD_MS)
  };
}

function beginFleetTravelFromMotion(motion, options = {}) {
  const runtime = buildFleetTravelRuntime(motion);
  if (!runtime) return false;
  if (options.persistMotion !== false) upsertFleetMotionRecord(runtime);
  fleetTravelState.set(runtime.fleetId, runtime);
  const fleet = fleetIndex.get(runtime.fleetId);
  if (fleet) updateFleetElement(fleet);
  if (options.playStartAudio) playAudioCue(hyperspaceStartAudio);
  ensureFleetTravelAnimation();
  return true;
}

function syncFleetTravelStateFromCampaign() {
  const activeFleetIds = new Set();
  (Array.isArray(state.fleetMotions) ? state.fleetMotions : []).forEach((motion) => {
    if (beginFleetTravelFromMotion(motion, { persistMotion: false })) {
      activeFleetIds.add(motion.fleetId);
    }
  });
  [...fleetTravelState.keys()].forEach((fleetId) => {
    if (!activeFleetIds.has(fleetId)) fleetTravelState.delete(fleetId);
  });
  if (!fleetTravelState.size && fleetTravelFrame) {
    cancelAnimationFrame(fleetTravelFrame);
    fleetTravelFrame = 0;
  }
}

function tickFleetTravelAnimation() {
  fleetTravelFrame = 0;
  if (!fleetTravelState.size) return;
  const now = Date.now();
  let stillTraveling = false;
  fleetTravelState.forEach((travel, fleetId) => {
    const fleet = fleetIndex.get(fleetId);
    if (!fleet) {
      fleetTravelState.delete(fleetId);
      return;
    }
    const elapsed = now - travel.startedAtMs;
    const movementElapsed = Math.max(0, elapsed - FLEET_HYPERSPACE_START_DELAY_MS);
    const progress = clamp(movementElapsed / travel.durationMs, 0, 1);
    const distance = travel.totalLength * progress;
    if (!travel.finishAudioPlayed && elapsed >= Math.max(FLEET_HYPERSPACE_START_DELAY_MS, (travel.durationMs + FLEET_HYPERSPACE_START_DELAY_MS) - FLEET_HYPERSPACE_FINISH_LEAD_MS)) {
      travel.finishAudioPlayed = true;
      playAudioCue(hyperspaceFinishAudio);
    }
    travel.currentPosition = samplePolylineAtDistance(travel.points, distance);
    updateFleetElement(fleet);
    if (progress >= 1) {
      fleetTravelState.delete(fleetId);
      removeFleetMotionRecord(fleetId);
      fleet.planetId = travel.targetPlanetId;
      fleet.locationPlanetId = travel.targetPlanetId;
      syncFleetCoords(fleet);
      rebuildFleetRenderPositions();
      updateFleetElement(fleet);
      if (selected?.type === 'fleet' && selected.id === fleet.id) openFleet(fleet.id);
      saveLocal();
      setStatus(`Flotte angekommen: ${fleet.name} -> ${travel.targetPlanetName}`);
      return;
    }
    stillTraveling = true;
  });
  if (stillTraveling) {
    fleetTravelFrame = requestAnimationFrame(tickFleetTravelAnimation);
  }
}

function ensureFleetTravelAnimation() {
  if (fleetTravelFrame || !fleetTravelState.size) return;
  fleetTravelFrame = requestAnimationFrame(tickFleetTravelAnimation);
}

function setHoveredRoute(id) {

function updatePlanetSearchResults(query) {

  if (normalizedQuery.length < 2) {
    closePlanetSearchResults();
    return;

  searchResultsState = state.planets
    .map((planet) => ({
      planet,
      haystack: getPlanetSearchHaystack(planet)
    }))
    .filter((entry) => entry.haystack.includes(normalizedQuery))
    .sort((a, b) => {
      const aStarts = normalizeSearchText(a.planet.name).startsWith(normalizedQuery) ? 0 : 1;
      const bStarts = normalizeSearchText(b.planet.name).startsWith(normalizedQuery) ? 0 : 1;
      if (aStarts !== bStarts) return aStarts - bStarts;
      return a.planet.name.localeCompare(b.planet.name, 'de');

    .map((entry) => entry.planet);

function startFleetJump(id) {
  const fleet = fleetIndex.get(id);
  if (!fleet || !canEditFaction(fleet.faction) || isFleetTraveling(fleet)) return;
  const jumpInput = document.getElementById('fleetJumpTarget');
  const typedTarget = jumpInput?.value?.trim() || '';
  let targetId = document.getElementById('fleetJumpTargetId')?.value || fleetJumpSearchState.selectedPlanetId;
  if (!targetId && typedTarget) {
    const normalizedTypedTarget = normalizeSearchText(typedTarget);
    const exactMatch = state.planets.find((planet) => planetMatchesExactSearch(planet, normalizedTypedTarget));
    if (exactMatch) targetId = exactMatch.id;
  }
  const targetPlanet = planetIndex.get(targetId);
  const sourcePlanet = planetIndex.get(fleet.locationPlanetId || fleet.planetId);
  if (!sourcePlanet || !targetPlanet) {
    setStatus('Bitte ein gueltiges Sprungziel aus der Suche auswaehlen.');
    return;
  }
  if (sourcePlanet.id === targetPlanet.id) {
    setStatus('Flotte befindet sich bereits am ausgewaehlten Ziel.');
    return;
  }
  const plan = findFleetTravelPlan(sourcePlanet.id, targetPlanet.id);
  if (!plan || plan.points.length < 2 || plan.totalLength <= 0) {
    setStatus(`Keine gueltige Hyperraumroute von ${sourcePlanet.name} nach ${targetPlanet.name} gefunden.`);
    return;
  }
  const motion = {
    fleetId: fleet.id,
    sourcePlanetId: sourcePlanet.id,
    sourcePlanetName: sourcePlanet.name,
    targetPlanetId: targetPlanet.id,
    targetPlanetName: targetPlanet.name,
    startedAtMs: Date.now(),
    durationMs: Math.max(6000, (plan.totalLength / FLEET_TRAVEL_REFERENCE_DISTANCE) * FLEET_TRAVEL_REFERENCE_DURATION_MS),
  };
  upsertFleetMotionRecord(motion);
  beginFleetTravelFromMotion(motion, { persistMotion: false });
  playAudioCue(hyperspaceStartAudio);
  emitLiveSocketEvent('fx:fleet-jump-start', { motion });
  ensureFleetTravelAnimation();
  updateFleetElement(fleet);
  if (selected?.type === 'fleet' && selected.id === fleet.id) openFleet(fleet.id);
  saveLocal();
  setStatus(`Sprung eingeleitet: ${fleet.name} -> ${targetPlanet.name}`);
}

async function attemptLogin() {
  const username = document.getElementById('loginUser')?.value || '';
  const password = document.getElementById('loginPassword')?.value || '';
  if (!serverSync.enabled) {
    setStatus('Login benötigt den Server-Modus über http://localhost.');
    return;
  }
  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const payload = await response.json();
    if (!response.ok) throw new Error(payload.error || 'Login fehlgeschlagen');
    serverSync.session = payload.user || { id: null, username: '', role: 'Viewer' };
    currentAuthenticatedUsername = payload.user?.username || '';
    roleSelect.value = payload.user?.role || 'Viewer';
    refreshRoleChrome();
    destroyServerSocketConnection();
    clearServerReconnectTimer();
    await bootstrapFromServer();
    if (selected?.type === 'planet') openPlanet(selected.id);
    if (selected?.type === 'fleet') openFleet(selected.id);
    if (selected?.type === 'route') openRoute(selected.id);
    if (activeMainTab === 'fleetManagement') renderFleetManagementView();
    if (activeMainTab === 'shipyard') renderShipyardView();
    if (activeMainTab === 'loginManager') renderLoginManagerView();
    setStatus(`Login erfolgreich: ${payload.user.username} (${payload.user.role})`);
  } catch (error) {
    currentAuthenticatedUsername = '';
    serverSync.session = { id: null, username: '', role: 'Viewer' };
    roleSelect.value = 'Viewer';
    refreshRoleChrome();
    if (String(error.message || '').includes('Failed to fetch')) {
      disableLiveSync('Login fehlgeschlagen: Server nicht erreichbar. Lokaler Offline-Modus aktiv.');
      return;
    }
    setStatus(`Login fehlgeschlagen: ${error.message}`);
  }
}

function syncPlanetCoords(planet) {
  const hasWorldX = Number.isFinite(planet.x);
  const hasWorldY = Number.isFinite(planet.y);
  const hasNormX = Number.isFinite(planet.xNorm);
  const hasNormY = Number.isFinite(planet.yNorm);
  const normWorldX = hasNormX ? planet.xNorm * WORLD_SIZE : NaN;
  const normWorldY = hasNormY ? planet.yNorm * WORLD_SIZE : NaN;
  const rawX = hasWorldX && (!hasNormX || Math.abs(normWorldX - planet.x) > 2) ? planet.x : normWorldX;
  const rawY = hasWorldY && (!hasNormY || Math.abs(normWorldY - planet.y) > 2) ? planet.y : normWorldY;
  planet.x = clamp(Number.isFinite(rawX) ? rawX : WORLD_SIZE / 2, 0, WORLD_SIZE);
  planet.y = clamp(Number.isFinite(rawY) ? rawY : WORLD_SIZE / 2, 0, WORLD_SIZE);
  planet.xNorm = planet.x / WORLD_SIZE;
  planet.yNorm = planet.y / WORLD_SIZE;
}

function setPlanetWorldPosition(planet, x, y) {
  planet.x = clamp(x, 0, WORLD_SIZE);
  planet.y = clamp(y, 0, WORLD_SIZE);
  planet.xNorm = planet.x / WORLD_SIZE;
  planet.yNorm = planet.y / WORLD_SIZE;
}

function syncFleetCoords(fleet) {
  const planet = planetIndex.get(fleet.locationPlanetId || fleet.planetId);
  if (!planet) {
    return;
  }
  fleet.planetId = planet.id;
  fleet.locationPlanetId = planet.id;
  fleet.x = planet.x;
  fleet.y = planet.y;
}

function nearestPlanet(x, y) {
  let best = null;
  let bestDistanceSq = Infinity;
  for (const planet of state.planets) {
    const dx = planet.x - x;
    const dy = planet.y - y;
    const distanceSq = dx * dx + dy * dy;
    if (distanceSq < bestDistanceSq) {
      bestDistanceSq = distanceSq;
      best = planet;
    }
  }
  return best;
}

function nearestDisplayedPlanet(x, y, maxDistance = 16) {
  if (!layers.planets) return null;
  let best = null;
  let bestDistanceSq = maxDistance * maxDistance;
  state.planets.forEach((planet) => {
    if (!isPlanetVisibleInClusterZoom(planet)) return;
    const display = getPlanetDisplayPosition(planet);
    const dx = display.x - x;
    const dy = display.y - y;
    const distanceSq = dx * dx + dy * dy;
    if (distanceSq <= bestDistanceSq) {
      bestDistanceSq = distanceSq;
      best = planet;
    }
  });
  return best;
}

function pointToSegmentDistanceSq(px, py, ax, ay, bx, by) {
  const abx = bx - ax;
  const aby = by - ay;
  const apx = px - ax;
  const apy = py - ay;
  const abLenSq = (abx * abx) + (aby * aby);
  if (abLenSq <= 1e-6) {
    const dx = px - ax;
    const dy = py - ay;
    return dx * dx + dy * dy;
  }
  const t = clamp(((apx * abx) + (apy * aby)) / abLenSq, 0, 1);
  const closestX = ax + (abx * t);
  const closestY = ay + (aby * t);
  const dx = px - closestX;
  const dy = py - closestY;
  return dx * dx + dy * dy;
}

function nearestDisplayedRoute(x, y, maxDistance = 18) {
  if (!layers.hyperlanes) return null;
  let best = null;
  let bestDistanceSq = maxDistance * maxDistance;
  tacticalRouteCache.forEach((route) => {
    if (route.bounds) {
      const expandedMinX = route.bounds.minX - maxDistance;
      const expandedMaxX = route.bounds.maxX + maxDistance;
      const expandedMinY = route.bounds.minY - maxDistance;
      const expandedMaxY = route.bounds.maxY + maxDistance;
      if (x < expandedMinX || x > expandedMaxX || y < expandedMinY || y > expandedMaxY) return;
    }
    route.paths.forEach((path) => {
      for (let i = 1; i < path.length; i += 1) {
        const prev = path[i - 1];
        const next = path[i];
        const distanceSq = pointToSegmentDistanceSq(x, y, prev.x, prev.y, next.x, next.y);
        if (distanceSq <= bestDistanceSq) {
          bestDistanceSq = distanceSq;
          best = route;
        }
      }
    });
  });
  return best;
}

function rebuildIndexes() {
  ensureImportantCampaignPlanets();
  planetIndex.clear();
  fleetIndex.clear();
  state.planets.forEach((planet) => {
    syncPlanetCoords(planet);
    planetIndex.set(planet.id, planet);
  });
  state.fleets.forEach((fleet) => {
    const currentPlanetId = fleet.locationPlanetId || fleet.planetId;
    if (!currentPlanetId || !planetIndex.has(currentPlanetId)) {
      const fallback = Number.isFinite(fleet.x) && Number.isFinite(fleet.y)
        ? nearestPlanet(fleet.x, fleet.y)
        : null;
      if (fallback) {
        fleet.planetId = fallback.id;
        fleet.locationPlanetId = fallback.id;
      }
    }
    syncFleetCoords(fleet);
    fleetIndex.set(fleet.id, fleet);
  });
  buildGridModel();
  rebuildFleetRenderPositions();
}

function updateFleetElement(fleet) {
  const entry = fleetElements.get(fleet.id);
  if (!entry) return;
  const locationPlanetId = fleet.locationPlanetId || fleet.planetId;
  if (!locationPlanetId && !Number.isFinite(fleet.x) && !Number.isFinite(fleet.y)) {
    entry.classList.add('hidden');
    return;
  }
  const renderPos = getFleetDisplayPosition(fleet);
  const isSelected = selected?.type === 'fleet' && selected.id === fleet.id;
  const isMoving = isFleetTraveling(fleet);
  entry.className = 'fleet ' + fleet.faction + (activeInteraction?.mode === 'fleet-drag' && activeInteraction.id === fleet.id ? ' dragging' : '') + (isSelected ? ' selected' : '') + (isMoving ? ' moving' : '');
  entry.style.left = renderPos.x + 'px';
  entry.style.top = renderPos.y + 'px';
  entry.title = fleet.name;
  entry.style.pointerEvents = isMoving ? 'none' : 'auto';
  entry.classList.remove('hidden');
  entry.querySelector('img').src = iconFor(fleet);
  const travel = fleetTravelState.get(fleet.id);
  entry.querySelector('.fleet-tag').textContent = travel ? `${fleet.name} -> ${travel.targetPlanetName}` : fleet.name;
}

function ensurePlanetElements() {
  const seen = new Set();
  const frag = document.createDocumentFragment();
  const labelFrag = document.createDocumentFragment();
  state.planets.forEach((planet) => {
    seen.add(planet.id);
    if (!planetElements.has(planet.id)) {
      const point = document.createElement('div');
      point.dataset.id = planet.id;
      point.style.pointerEvents = 'auto';
      point.addEventListener('click', (event) => {
        event.stopPropagation();
        openPlanet(planet.id);
      });
      point.addEventListener('pointerdown', (event) => {
        event.stopPropagation();
        if (event.button !== 0 || currentRole() !== 'Admin' || !event.altKey) return;
        event.preventDefault();
        activeInteraction = { mode: 'planet-drag', id: planet.id, pointerId: event.pointerId };
        viewport.classList.add('dragging');
        setStatus('Kalibrierung aktiv: ' + planet.name);
      });
      const label = document.createElement('div');
      label.className = 'planet-label';
      frag.appendChild(point);
      labelFrag.appendChild(label);
      planetElements.set(planet.id, { point, label });
    }
    updatePlanetElement(planet);
  });
  if (frag.childNodes.length) planetLayer.appendChild(frag);
  if (labelFrag.childNodes.length) planetLayer.appendChild(labelFrag);
  for (const [planetId, entry] of planetElements.entries()) {
    if (!seen.has(planetId)) {
      entry.point.remove();
      entry.label.remove();
      planetElements.delete(planetId);
    }
  }
}

function ensureFleetElements() {
  rebuildFleetRenderPositions();
  const seen = new Set();
  const frag = document.createDocumentFragment();
  state.fleets.forEach((fleet) => {
    seen.add(fleet.id);
    if (!fleetElements.has(fleet.id)) {
      const el = document.createElement('div');
      el.dataset.id = fleet.id;
      el.innerHTML = `<img src="${iconFor(fleet)}" alt=""><div class="fleet-tag"></div>`;
      el.addEventListener('click', (event) => {
        event.stopPropagation();
        if (isFleetTraveling(fleet.id)) return;
        openFleet(fleet.id);
      });
      frag.appendChild(el);
      fleetElements.set(fleet.id, el);
    }
    updateFleetElement(fleet);
  });
  if (frag.childNodes.length) fleetLayer.appendChild(frag);
  for (const [fleetId, el] of fleetElements.entries()) {
    if (!seen.has(fleetId)) {
      el.remove();
      fleetElements.delete(fleetId);
    }
  }
}

function buildRouteCache() {
  initMapAnalysis();
  const points = state.planets;
  const edges = [];
  const used = new Set();
  const radiusSq = 120 * 120;
  for (let i = 0; i < points.length; i += 1) {
    const base = points[i];
    const candidates = [];
    for (let j = 0; j < points.length; j += 1) {
      if (i === j) continue;
      const other = points[j];
      const dx = base.x - other.x;
      const dy = base.y - other.y;
      const distSq = dx * dx + dy * dy;
      if (distSq <= radiusSq) {
        candidates.push([distSq, j]);
      }
    }
    candidates.sort((a, b) => a[0] - b[0]);
    candidates.slice(0, 3).forEach(([, idx]) => {
      const key = i < idx ? `${i}-${idx}` : `${idx}-${i}`;
      const laneScore = hyperlaneSegmentScore(base, points[idx]);
      if (laneScore < 55) return;
      if (!used.has(key)) {
        used.add(key);
        edges.push([base, points[idx]]);
      }
    });
  }
  const neutralState = new Map();
  edges.forEach(([a, b]) => {
    if (a.owner === 'NEUTRAL') {
      const entry = neutralState.get(a.id) || { gar: false, kus: false };
      entry.gar ||= b.owner === 'GAR';
      entry.kus ||= b.owner === 'KUS';
      neutralState.set(a.id, entry);
    }
    if (b.owner === 'NEUTRAL') {
      const entry = neutralState.get(b.id) || { gar: false, kus: false };
      entry.gar ||= a.owner === 'GAR';
      entry.kus ||= a.owner === 'KUS';
      neutralState.set(b.id, entry);
    }
  });
  routeCache = edges.map(([a, b]) => {
    let cls = null;
    if (a.owner === 'GAR' && b.owner === 'GAR') cls = 'blue';
    else if (a.owner === 'KUS' && b.owner === 'KUS') cls = 'red';
    else if ((a.owner === 'GAR' && b.owner === 'KUS') || (a.owner === 'KUS' && b.owner === 'GAR')) cls = 'purple';
    else if (a.owner === 'NEUTRAL' || b.owner === 'NEUTRAL') {
      const neutral = a.owner === 'NEUTRAL' ? a : b;
      const other = neutral.id === a.id ? b : a;
      const contested = neutralState.get(neutral.id);
      if (contested?.gar && contested?.kus) cls = 'purple';
      else if (other.owner === 'GAR') cls = 'purple';
      else if (other.owner === 'KUS') cls = 'red';
    }
    return cls ? { id: getRouteId(a, b), a, b, cls } : null;
  }).filter(Boolean);
}

function renderFrontline() {
  overlay.innerHTML = '';
  const frag = document.createDocumentFragment();
  routeCache.forEach((route) => {
    const { a, b, cls, id } = route;
    const start = getPlanetDisplayPosition(a);
    const end = getPlanetDisplayPosition(b);
    const hitbox = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    hitbox.setAttribute('x1', start.x);
    hitbox.setAttribute('y1', start.y);
    hitbox.setAttribute('x2', end.x);
    hitbox.setAttribute('y2', end.y);
    hitbox.setAttribute('stroke', '#ffffff');
    hitbox.setAttribute('stroke-opacity', '0.001');
    hitbox.setAttribute('stroke-width', '28');
    hitbox.setAttribute('stroke-linecap', 'round');
    hitbox.setAttribute('class', 'route-hitbox ' + (cls === 'purple' ? 'contestedLine' : 'frontLine'));
    hitbox.dataset.routeId = id;
    hitbox.dataset.routeHitbox = 'true';
    frag.appendChild(hitbox);
  });
  overlay.appendChild(frag);
  refreshRouteSelectionState();
}

function addSvgText(parent, attrs, text) {
  const node = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
  node.textContent = text;
  parent.appendChild(node);
}

function renderSectionSafely(sectionName, fn) {
  try {
    fn();
  } catch (error) {
    console.error(`ArcGIS section failed: ${sectionName}`, error);
  }
}

function canvasPathFromPoints(ctx, points) {
  if (!Array.isArray(points) || !points.length) return false;
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i += 1) ctx.lineTo(points[i].x, points[i].y);
  return true;
}

function drawCanvasPolyline(ctx, points, strokeStyle, lineWidth, dash = []) {
  if (!canvasPathFromPoints(ctx, points)) return;
  ctx.save();
  ctx.strokeStyle = strokeStyle;
  ctx.lineWidth = lineWidth;
  ctx.lineCap = 'round';
  ctx.setLineDash(dash);
  ctx.stroke();
  ctx.restore();
}

function getNearestPlanetByDisplayPoint(x, y) {
  let best = null;
  let bestDistanceSq = Infinity;
  state.planets.forEach((planet) => {
    const display = getPlanetDisplayPosition(planet);
    const dx = display.x - x;
    const dy = display.y - y;
    const distanceSq = dx * dx + dy * dy;
    if (distanceSq < bestDistanceSq) {
      bestDistanceSq = distanceSq;
      best = planet;
    }
  });
  return best;
}

function pathEndpointDistanceSq(pathA, pathB) {
  const endpointsA = [pathA[0], pathA[pathA.length - 1]];
  const endpointsB = [pathB[0], pathB[pathB.length - 1]];
  let best = Infinity;
  endpointsA.forEach((a) => {
    endpointsB.forEach((b) => {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const distanceSq = dx * dx + dy * dy;
      if (distanceSq < best) best = distanceSq;
    });
  });
  return best;
}

function buildBoundsForPaths(paths) {
  const bounds = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
  paths.forEach((path) => {
    path.forEach((point) => {
      if (point.x < bounds.minX) bounds.minX = point.x;
      if (point.y < bounds.minY) bounds.minY = point.y;
      if (point.x > bounds.maxX) bounds.maxX = point.x;
      if (point.y > bounds.maxY) bounds.maxY = point.y;
    });
  });
  return bounds;
}

function rebuildTacticalRouteCache(data, projectionMode) {
  const groupedRoutes = new Map();
  tacticalTravelEdges = [];
  (data?.hyperlanes || []).forEach((lane, laneIndex) => {
    const routeName = String(lane.name || `Hyperroute ${laneIndex + 1}`);
    if (!groupedRoutes.has(routeName)) {
      groupedRoutes.set(routeName, {
        name: routeName,
        pathEntries: []
      });
    }
    const route = groupedRoutes.get(routeName);
    (lane.paths || []).forEach((lanePath) => {
      const projectedPath = Array.isArray(lanePath) ? lanePath.map((point) => projectArcgisToWorld(point[0], point[1], projectionMode)) : [];
      if (projectedPath.length < 2) return;
      const startPlanet = getNearestPlanetByDisplayPoint(projectedPath[0].x, projectedPath[0].y);
      const endPlanet = getNearestPlanetByDisplayPoint(projectedPath[projectedPath.length - 1].x, projectedPath[projectedPath.length - 1].y);
      route.pathEntries.push({
        projectedPath,
        svgPath: projectedPath.map((point, index) => `${index ? 'L' : 'M'}${point.x.toFixed(2)},${point.y.toFixed(2)}`).join(' '),
        startPlanet,
        endPlanet
      });
      if (startPlanet && endPlanet && startPlanet.id !== endPlanet.id) {
        tacticalTravelEdges.push({
          id: `travel_edge__${laneIndex}__${route.pathEntries.length - 1}`,
          name: routeName,
          startPlanetId: startPlanet.id,
          endPlanetId: endPlanet.id,
          path: projectedPath,
          length: polylineLength(projectedPath)
        });
      }
    });
  });
  const connectivityThresholdSq = 80 * 80;
  tacticalRouteCache = [];
  groupedRoutes.forEach((group) => {
    const entries = group.pathEntries;
    const visited = new Set();
    let componentIndex = 0;
    for (let i = 0; i < entries.length; i += 1) {
      if (visited.has(i)) continue;
      const queue = [i];
      visited.add(i);
      const componentEntries = [];
      while (queue.length) {
        const currentIndex = queue.shift();
        const currentEntry = entries[currentIndex];
        componentEntries.push(currentEntry);
        for (let j = 0; j < entries.length; j += 1) {
          if (visited.has(j)) continue;
          if (pathEndpointDistanceSq(currentEntry.projectedPath, entries[j].projectedPath) <= connectivityThresholdSq) {
            visited.add(j);
            queue.push(j);
          }
        }
      }
      const componentName = componentIndex === 0 && visited.size === entries.length ? group.name : `${group.name} (${componentIndex + 1})`;
      const routeId = `hyperlane__${normalizePlanetKey(group.name)}__${componentIndex}`;
      const connectedPlanets = new Map();
      componentEntries.forEach((entry) => {
        if (entry.startPlanet) connectedPlanets.set(entry.startPlanet.id, entry.startPlanet);
        if (entry.endPlanet) connectedPlanets.set(entry.endPlanet.id, entry.endPlanet);
      });
      const paths = componentEntries.map((entry) => entry.projectedPath);
      tacticalRouteCache.push({
        id: routeId,
        name: componentName,
        paths,
        svgPaths: componentEntries.map((entry) => entry.svgPath),
        planets: [...connectedPlanets.values()],
        bounds: buildBoundsForPaths(paths)
      });
      componentIndex += 1;
    }
  });
}

function drawCanvasPolygonRings(ctx, rings, projectionMode, options = {}) {
  if (!Array.isArray(rings) || !rings.length) return false;
  ctx.save();
  ctx.beginPath();
  let drew = false;
  rings.forEach((ring) => {
    if (!Array.isArray(ring) || ring.length < 2) return;
    const start = projectArcgisToWorld(ring[0][0], ring[0][1], projectionMode);
    ctx.moveTo(start.x, start.y);
    for (let i = 1; i < ring.length; i += 1) {
      const point = projectArcgisToWorld(ring[i][0], ring[i][1], projectionMode);
      ctx.lineTo(point.x, point.y);
    }
    ctx.closePath();
    drew = true;
  });
  if (!drew) {
    ctx.restore();
    return false;
  }
  if (options.fillStyle) {
    ctx.fillStyle = options.fillStyle;
    ctx.fill();
  }
  if (options.strokeStyle) {
    ctx.strokeStyle = options.strokeStyle;
    ctx.lineWidth = options.lineWidth ?? 1;
    ctx.setLineDash(options.dash || []);
    ctx.stroke();
  }
  ctx.restore();
  return true;
}

function drawCanvasText(ctx, x, y, text, options = {}) {
  if (!text || !Number.isFinite(x) || !Number.isFinite(y)) return;
  ctx.save();
  ctx.font = options.font || '700 24px Segoe UI';
  ctx.fillStyle = options.fillStyle || '#d5e7fb';
  ctx.textAlign = options.align || 'center';
  ctx.textBaseline = options.baseline || 'middle';
  if (options.strokeStyle) {
    ctx.lineWidth = options.strokeWidth || 3;
    ctx.strokeStyle = options.strokeStyle;
    ctx.strokeText(text, x, y);
  }
  ctx.fillText(text, x, y);
  ctx.restore();
}

function getRectGridLayout(mode = viewMode, options = {}) {
  const columnCount = options.columns || 24;
  const rowCount = options.rows || 22;
  const imageGridOffsetColumns = options.imageGridOffsetColumns ?? -1;
  const imageGridOffsetRows = options.imageGridOffsetRows ?? -0.2;
  if (mode === 'image') {
    if (!gridModel) buildGridModel();
    const colEntries = [...(gridModel?.colCenters?.entries?.() || [])]
      .filter(([, center]) => Number.isFinite(center))
      .sort((a, b) => a[0].localeCompare(b[0]));
    const rowEntries = [...(gridModel?.rowCenters?.entries?.() || [])]
      .filter(([, center]) => Number.isFinite(center))
      .sort((a, b) => a[0] - b[0]);
    if (colEntries.length >= columnCount && rowEntries.length >= rowCount) {
      const getAverageStep = (entries) => {
        const deltas = [];
        for (let i = 1; i < entries.length; i += 1) {
          const delta = entries[i][1] - entries[i - 1][1];
          if (Number.isFinite(delta) && Math.abs(delta) > 1) deltas.push(delta);
        }
        return deltas.length ? (deltas.reduce((sum, value) => sum + value, 0) / deltas.length) : 0;
      };
      const columns = colEntries.slice(0, columnCount).map(([label]) => ({ label }));
      const rows = rowEntries.slice(0, rowCount).map(([label]) => ({ label: String(label) }));
      const columnStep = getAverageStep(colEntries) || (WORLD_SIZE / columnCount);
      const rowStep = getAverageStep(rowEntries) || (WORLD_SIZE / rowCount);
      const columnOrigin = colEntries[0][1] - (columnStep / 2) + (imageGridOffsetColumns * columnStep);
      const rowOrigin = rowEntries[0][1] - (rowStep / 2) + (imageGridOffsetRows * rowStep);
      const verticalLines = Array.from({ length: columnCount + 1 }, (_, index) => columnOrigin + (index * columnStep));
      const horizontalLines = Array.from({ length: rowCount + 1 }, (_, index) => rowOrigin + (index * rowStep));
      columns.forEach((column, index) => {
        column.center = columnOrigin + ((index + 0.5) * columnStep);
      });
      rows.forEach((row, index) => {
        row.center = rowOrigin + ((index + 0.5) * rowStep);
      });
      return { columns, rows, verticalLines, horizontalLines };
    }
  }
  const colWidth = WORLD_SIZE / columnCount;
  const rowHeight = WORLD_SIZE / rowCount;
  return {
    columns: Array.from({ length: columnCount }, (_, index) => ({
      label: String.fromCharCode(65 + index),
      center: (index + 0.5) * colWidth
    })),
    rows: Array.from({ length: rowCount }, (_, index) => ({
      label: String(index + 1),
      center: (index + 0.5) * rowHeight
    })),
    verticalLines: Array.from({ length: columnCount + 1 }, (_, index) => index * colWidth),
    horizontalLines: Array.from({ length: rowCount + 1 }, (_, index) => index * rowHeight)
  };
}

function computePointBounds(points) {
  const bounds = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
  points.forEach((point) => {
    bounds.minX = Math.min(bounds.minX, point.x);
    bounds.minY = Math.min(bounds.minY, point.y);
    bounds.maxX = Math.max(bounds.maxX, point.x);
    bounds.maxY = Math.max(bounds.maxY, point.y);
  });
  return bounds;
}

function projectArcgisRingsToWorld(rings, projectionMode) {
  return (rings || []).map((ring) => ring.map((point) => projectArcgisToWorld(point[0], point[1], projectionMode)));
}

function pointInPolygon(point, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i, i += 1) {
    const xi = polygon[i].x;
    const yi = polygon[i].y;
    const xj = polygon[j].x;
    const yj = polygon[j].y;
    const intersects = ((yi > point.y) !== (yj > point.y))
      && (point.x < (((xj - xi) * (point.y - yi)) / ((yj - yi) || 1e-6)) + xi);
    if (intersects) inside = !inside;
  }
  return inside;
}

function pointInAreaRings(point, rings) {
  let inside = false;
  rings.forEach((ring) => {
    if (ring.length >= 3 && pointInPolygon(point, ring)) inside = !inside;
  });
  return inside;
}

function createHoverArea(type, name, centroid, rings) {
  if (!name || !centroid || !Array.isArray(rings) || !rings.length) return null;
  const bounds = rings.reduce((acc, ring) => {
    const ringBounds = computePointBounds(ring);
    acc.minX = Math.min(acc.minX, ringBounds.minX);
    acc.minY = Math.min(acc.minY, ringBounds.minY);
    acc.maxX = Math.max(acc.maxX, ringBounds.maxX);
    acc.maxY = Math.max(acc.maxY, ringBounds.maxY);
    return acc;
  }, { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity });
  return { type, name, centroid, rings, bounds };
}

function buildGroupedHoverAreas(mode = viewMode) {
  const getPosition = mode === 'schematic' ? getSchematicPlanetPosition : getImagePlanetPosition;
  const regionGroups = new Map();
  const sectorGroups = new Map();
  state.planets.forEach((planet) => {
    const regionName = String(planet.region || '').trim();
    if (regionName) {
      if (!regionGroups.has(regionName)) regionGroups.set(regionName, []);
      regionGroups.get(regionName).push(getPosition(planet));
    }
    const sectorName = String(planet.sector || '').trim();
    if (sectorName) {
      const sectorKey = `${regionName || 'Unknown Region'}::${sectorName}`;
      if (!sectorGroups.has(sectorKey)) sectorGroups.set(sectorKey, { regionName, sectorName, points: [] });
      sectorGroups.get(sectorKey).points.push(getPosition(planet));
    }
  });
  const regions = [];
  const sectors = [];
  regionGroups.forEach((points, regionName) => {
    if (points.length < 3) return;
    const hull = expandHull(convexHull(points), 1.06, 40);
    regions.push(createHoverArea('region', regionName, averagePoints(points), [hull]));
  });
  sectorGroups.forEach(({ sectorName, points }) => {
    if (points.length < 3) return;
    const hull = expandHull(convexHull(points), 1.03, 20);
    sectors.push(createHoverArea('sector', sectorName, averagePoints(points), [hull]));
  });
  return {
    regions: regions.filter(Boolean),
    sectors: sectors.filter(Boolean)
  };
}

function buildTacticalHoverAreas(data, projectionMode, mode = viewMode) {
  if (mode === 'schematic') return buildGroupedHoverAreas('schematic');
  const regions = [];
  const sectors = [];
  if (data?.regions?.length) {
    data.regions.forEach((region) => {
      if (!Array.isArray(region.rings) || !region.rings.length || !region.name) return;
      const projectedRings = projectArcgisRingsToWorld(region.rings, projectionMode);
      const centroid = averageArcgisRing(region.rings[0], projectionMode);
      const area = createHoverArea('region', region.name, centroid, projectedRings);
      if (area) regions.push(area);
    });
  }
  if (data?.sectors?.length) {
    data.sectors.forEach((sector) => {
      if (!Array.isArray(sector.rings) || !sector.rings.length || !sector.name) return;
      const projectedRings = projectArcgisRingsToWorld(sector.rings, projectionMode);
      const centroid = averageArcgisRing(sector.rings[0], projectionMode);
      const area = createHoverArea('sector', sector.name, centroid, projectedRings);
      if (area) sectors.push(area);
    });
  }
  if (!regions.length || !sectors.length) {
    const grouped = buildGroupedHoverAreas('image');
    if (!regions.length) regions.push(...grouped.regions);
    if (!sectors.length) sectors.push(...grouped.sectors);
  }
  return { regions, sectors };
}

function findHoveredArea(areas, x, y) {
  const point = { x, y };
  for (let i = 0; i < areas.length; i += 1) {
    const area = areas[i];
    if (!area?.bounds) continue;
    if (x < area.bounds.minX || x > area.bounds.maxX || y < area.bounds.minY || y > area.bounds.maxY) continue;
    if (pointInAreaRings(point, area.rings)) return area;
  }
  return null;
}

function nearestDisplayedZone(x, y) {
  if (!layers.sectorLabels) return null;
  const sector = findHoveredArea(tacticalHoverAreas.sectors, x, y);
  const region = findHoveredArea(tacticalHoverAreas.regions, x, y);
  if (!sector && !region) return null;
  return {
    sector: sector ? { name: sector.name, centroid: sector.centroid } : null,
    region: region ? { name: region.name, centroid: region.centroid } : null
  };
}

function renderTacticalHoverLabels() {
  tacticalOverlay.querySelectorAll('.tactical-hover-label').forEach((el) => el.remove());
  if (!layers.sectorLabels || !hoveredZoneInfo) return;
  const frag = document.createDocumentFragment();
  if (hoveredZoneInfo.region?.name && hoveredZoneInfo.region?.centroid) {
    addSvgText(frag, { x: hoveredZoneInfo.region.centroid.x, y: hoveredZoneInfo.region.centroid.y, class: 'tactical-hover-label region' }, hoveredZoneInfo.region.name);
  }
  if (hoveredZoneInfo.sector?.name && hoveredZoneInfo.sector?.centroid) {
    const regionCentroid = hoveredZoneInfo.region?.centroid;
    const sectorY = regionCentroid && Math.abs(regionCentroid.y - hoveredZoneInfo.sector.centroid.y) < 42
      ? hoveredZoneInfo.sector.centroid.y + 34
      : hoveredZoneInfo.sector.centroid.y;
    addSvgText(frag, { x: hoveredZoneInfo.sector.centroid.x, y: sectorY, class: 'tactical-hover-label sector' }, hoveredZoneInfo.sector.name);
  }
  tacticalOverlay.appendChild(frag);
}

function drawRectGridSection(ctx, options = {}) {
  const layout = getRectGridLayout(options.mode || viewMode, options);
  ctx.save();
  ctx.strokeStyle = options.strokeStyle || 'rgba(88,222,255,.6)';
  ctx.lineWidth = options.lineWidth || 1.15;
  layout.verticalLines.forEach((x) => {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, WORLD_SIZE);
    ctx.stroke();
  });
  layout.horizontalLines.forEach((y) => {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(WORLD_SIZE, y);
    ctx.stroke();
  });
  ctx.restore();
  layout.columns.forEach(({ label, center }) => {
    drawCanvasText(ctx, center, 24, label, {
      font: '700 20px Segoe UI',
      fillStyle: 'rgba(133,240,255,.6)',
      strokeStyle: 'rgba(0,0,0,.38)',
      strokeWidth: 3
    });
  });
  layout.rows.forEach(({ label, center }) => {
    drawCanvasText(ctx, 16, center + 6, label, {
      font: '700 20px Segoe UI',
      fillStyle: 'rgba(133,240,255,.6)',
      strokeStyle: 'rgba(0,0,0,.38)',
      strokeWidth: 3,
      align: 'left'
    });
  });
}

function getInfluenceAdjacency() {
  const adjacency = new Map();
  tacticalTravelEdges.forEach((edge) => {
    if (!adjacency.has(edge.startPlanetId)) adjacency.set(edge.startPlanetId, new Set());
    if (!adjacency.has(edge.endPlanetId)) adjacency.set(edge.endPlanetId, new Set());
    adjacency.get(edge.startPlanetId).add(edge.endPlanetId);
    adjacency.get(edge.endPlanetId).add(edge.startPlanetId);
  });
  return adjacency;
}

function getNeutralInfluenceStatus(planet, adjacency) {
  if (!planet || planet.owner !== 'NEUTRAL') return null;
  const neighbors = [...(adjacency.get(planet.id) || [])]
    .map((neighborId) => planetIndex.get(neighborId))
    .filter(Boolean);
  const hasGAR = neighbors.some((neighbor) => neighbor.owner === 'GAR');
  const hasKUS = neighbors.some((neighbor) => neighbor.owner === 'KUS');
  if (hasGAR && hasKUS) return 'CONTESTED';
  if (hasGAR) return 'GAR_PRESSURE';
  if (hasKUS) return 'KUS_PRESSURE';
  return 'NEUTRAL';
}

function getHyperlaneVisualState(a, b, adjacency) {
  if (!a || !b) return { color: 'rgba(160,170,188,.28)', contested: false };
  if (a.owner === 'GAR' && b.owner === 'GAR') return { color: 'rgba(31,124,255,.5)', contested: false };
  if (a.owner === 'KUS' && b.owner === 'KUS') return { color: 'rgba(208,54,50,.5)', contested: false };
  if ((a.owner === 'GAR' && b.owner === 'KUS') || (a.owner === 'KUS' && b.owner === 'GAR')) return { color: 'rgba(156,67,255,.72)', contested: true };
  if (a.owner === 'NEUTRAL' && b.owner === 'NEUTRAL') {
    const aStatus = getNeutralInfluenceStatus(a, adjacency);
    const bStatus = getNeutralInfluenceStatus(b, adjacency);
    if (aStatus === 'CONTESTED' || bStatus === 'CONTESTED') return { color: 'rgba(156,67,255,.42)', contested: true };
    return { color: 'rgba(170,176,188,.24)', contested: false };
  }
  const neutral = a.owner === 'NEUTRAL' ? a : (b.owner === 'NEUTRAL' ? b : null);
  const faction = neutral && neutral.id === a.id ? b : a;
  const neutralStatus = neutral ? getNeutralInfluenceStatus(neutral, adjacency) : null;
  if (neutralStatus === 'CONTESTED') return { color: faction?.owner === 'GAR' ? 'rgba(110,140,255,.66)' : 'rgba(186,94,255,.66)', contested: true };
  if (neutralStatus === 'GAR_PRESSURE') return { color: 'rgba(94,154,255,.44)', contested: true };
  if (neutralStatus === 'KUS_PRESSURE') return { color: 'rgba(222,98,120,.44)', contested: true };
  return { color: 'rgba(170,176,188,.24)', contested: false };
}

function drawInfluencePlanetHalo(ctx, x, y, innerColor, outerColor, radius) {
  const gradient = ctx.createRadialGradient(x, y, radius * 0.08, x, y, radius);
  gradient.addColorStop(0, innerColor);
  gradient.addColorStop(0.55, outerColor);
  gradient.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.fillStyle = gradient;
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
}

function renderInfluenceClouds() {
  const width = influenceCanvas.width || WORLD_SIZE;
  const height = influenceCanvas.height || WORLD_SIZE;
  influenceCtx.clearRect(0, 0, width, height);
  if (!layers.influence) return;
  if (!tacticalBaseReady && viewMode !== 'schematic') {
    scheduleTacticalBaseBuild();
    return;
  }
  const adjacency = getInfluenceAdjacency();
  const drawCloudPass = (predicate, strokeStyle, lineWidth, blur, alpha) => {
    influenceCtx.save();
    influenceCtx.globalAlpha = alpha;
    influenceCtx.filter = `blur(${blur}px)`;
    influenceCtx.lineCap = 'round';
    influenceCtx.lineJoin = 'round';
    influenceCtx.strokeStyle = strokeStyle;
    influenceCtx.lineWidth = lineWidth;
    tacticalTravelEdges.forEach((edge) => {
      const start = planetIndex.get(edge.startPlanetId);
      const end = planetIndex.get(edge.endPlanetId);
      if (!start || !end || !predicate(start, end, edge)) return;
      canvasPathFromPoints(influenceCtx, edge.path);
      influenceCtx.stroke();
    });
    influenceCtx.restore();
  };

  drawCloudPass((a, b) => a.owner === 'GAR' && b.owner === 'GAR', 'rgba(31,124,255,.95)', 70, 18, 0.28);
  drawCloudPass((a, b) => a.owner === 'KUS' && b.owner === 'KUS', 'rgba(208,54,50,.95)', 70, 18, 0.28);
  if (layers.contested) {
    drawCloudPass((a, b) => {
      const visual = getHyperlaneVisualState(a, b, adjacency);
      return visual.contested;
    }, 'rgba(156,67,255,.88)', 54, 16, 0.22);
  }

  state.planets.forEach((planet) => {
    const position = getPlanetDisplayPosition(planet);
    if (planet.owner === 'GAR') {
      drawInfluencePlanetHalo(influenceCtx, position.x, position.y, 'rgba(115,184,255,.5)', 'rgba(31,124,255,.2)', 68);
      return;
    }
    if (planet.owner === 'KUS') {
      drawInfluencePlanetHalo(influenceCtx, position.x, position.y, 'rgba(255,126,126,.46)', 'rgba(208,54,50,.18)', 68);
      return;
    }
    if (layers.contested) {
      const status = getNeutralInfluenceStatus(planet, adjacency);
      if (status === 'CONTESTED') {
        drawInfluencePlanetHalo(influenceCtx, position.x, position.y, 'rgba(205,150,255,.42)', 'rgba(156,67,255,.16)', 60);
      } else if (status === 'GAR_PRESSURE') {
        drawInfluencePlanetHalo(influenceCtx, position.x, position.y, 'rgba(133,190,255,.22)', 'rgba(122,140,160,.1)', 48);
      } else if (status === 'KUS_PRESSURE') {
        drawInfluencePlanetHalo(influenceCtx, position.x, position.y, 'rgba(255,138,138,.22)', 'rgba(152,132,144,.1)', 48);
      } else {
        drawInfluencePlanetHalo(influenceCtx, position.x, position.y, 'rgba(255,228,112,.14)', 'rgba(178,178,178,.08)', 40);
      }
    }
  });
}

function createTacticalSectionCanvas(width, height) {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  return canvas;
}

function renderTacticalSectionToContext(ctx, sectionName, data, projectionMode) {
  renderSectionSafely(sectionName, () => {
    if (sectionName === 'grid') {
      drawRectGridSection(ctx, { mode: projectionMode === 'image' ? 'image' : 'schematic' });
      return;
    }
    if (sectionName === 'sectors') {
      if (data.regions?.length) {
        data.regions.forEach((region) => {
          if (!Array.isArray(region.rings) || !region.rings.length) return;
          drawCanvasPolygonRings(ctx, region.rings, projectionMode, {
            fillStyle: 'rgba(247,231,104,.06)',
            strokeStyle: 'rgba(255,232,92,.72)',
            lineWidth: 2.8
          });
        });
      }
      if (data.sectors?.length) {
        data.sectors.forEach((sector) => {
          if (!Array.isArray(sector.rings) || !sector.rings.length) return;
          drawCanvasPolygonRings(ctx, sector.rings, projectionMode, {
            fillStyle: 'rgba(121,163,212,.05)',
            strokeStyle: 'rgba(170,214,255,.82)',
            lineWidth: 2
          });
        });
        return;
      }
      const regionGroups = new Map();
      const sectorGroups = new Map();
      data.planets.forEach((planet) => {
        const regionName = String(planet.region || '').trim();
        if (regionName) {
          if (!regionGroups.has(regionName)) regionGroups.set(regionName, []);
          regionGroups.get(regionName).push(projectArcgisToWorld(planet.x, planet.y, projectionMode));
        }
        const sectorName = String(planet.sector || '').trim();
        if (!sectorName) return;
        if (!sectorGroups.has(sectorName)) sectorGroups.set(sectorName, []);
        sectorGroups.get(sectorName).push(projectArcgisToWorld(planet.x, planet.y, projectionMode));
      });
      regionGroups.forEach((points) => {
        if (points.length < 3) return;
        const outline = expandHull(convexHull(points), 1.06, 40);
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(outline[0].x, outline[0].y);
        for (let i = 1; i < outline.length; i += 1) ctx.lineTo(outline[i].x, outline[i].y);
        ctx.closePath();
        ctx.fillStyle = 'rgba(247,231,104,.06)';
        ctx.strokeStyle = 'rgba(255,232,92,.72)';
        ctx.lineWidth = 2.8;
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      });
      sectorGroups.forEach((points, sectorName) => {
        if (points.length < 3) return;
        const outline = expandHull(convexHull(points), 1.04, 18);
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(outline[0].x, outline[0].y);
        for (let i = 1; i < outline.length; i += 1) ctx.lineTo(outline[i].x, outline[i].y);
        ctx.closePath();
        ctx.fillStyle = 'rgba(121,163,212,.05)';
        ctx.strokeStyle = 'rgba(170,214,255,.82)';
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      });
      return;
    }
    if (sectionName === 'hyperlanes') {
      const adjacency = getInfluenceAdjacency();
      tacticalRouteCache.forEach((route) => {
        route.paths.forEach((projected) => {
          const startPlanet = getNearestPlanetByDisplayPoint(projected[0].x, projected[0].y);
          const endPlanet = getNearestPlanetByDisplayPoint(projected[projected.length - 1].x, projected[projected.length - 1].y);
          const visual = getHyperlaneVisualState(startPlanet, endPlanet, adjacency);
          drawCanvasPolyline(ctx, projected, visual.color, 4, [10, 8]);
        });
      });
    }
  });
}

function getTacticalSectionCanvas(sectionName, data, projectionMode, width, height) {
  const cacheKey = `${projectionMode}:${sectionName}:${width}x${height}`;
  if (tacticalSectionCanvasCache.has(cacheKey)) return tacticalSectionCanvasCache.get(cacheKey);
  const canvas = createTacticalSectionCanvas(width, height);
  const ctx = canvas.getContext('2d');
  renderTacticalSectionToContext(ctx, sectionName, data, projectionMode);
  tacticalSectionCanvasCache.set(cacheKey, canvas);
  return canvas;
}

function convexHull(points) {
  if (points.length <= 2) return points.slice();
  const sorted = points
    .map((point) => ({ x: point.x, y: point.y }))
    .sort((a, b) => (a.x - b.x) || (a.y - b.y));
  const cross = (o, a, b) => ((a.x - o.x) * (b.y - o.y)) - ((a.y - o.y) * (b.x - o.x));
  const lower = [];
  sorted.forEach((point) => {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], point) <= 0) lower.pop();
    lower.push(point);
  });
  const upper = [];
  for (let i = sorted.length - 1; i >= 0; i -= 1) {
    const point = sorted[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], point) <= 0) upper.pop();
    upper.push(point);
  }
  upper.pop();
  lower.pop();
  return lower.concat(upper);
}

function expandHull(points, scale = 1.08, minRadius = 22) {
  if (!points.length) return [];
  const center = points.reduce((acc, point) => ({ x: acc.x + point.x, y: acc.y + point.y }), { x: 0, y: 0 });
  center.x /= points.length;
  center.y /= points.length;
  return points.map((point) => {
    const dx = point.x - center.x;
    const dy = point.y - center.y;
    const distance = Math.hypot(dx, dy) || 1;
    const target = Math.max(distance * scale, distance + minRadius);
    return {
      x: clamp(center.x + (dx / distance) * target, 0, WORLD_SIZE),
      y: clamp(center.y + (dy / distance) * target, 0, WORLD_SIZE)
    };
  });
}

function drawHull(parent, points, className) {
  if (points.length < 3) return;
  const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  polygon.setAttribute('points', points.map((point) => `${point.x},${point.y}`).join(' '));
  polygon.setAttribute('class', className);
  parent.appendChild(polygon);
}

function scheduleTacticalBaseBuild() {
  if (tacticalBaseReady || tacticalBuildQueued) return;
  const projectionMode = viewMode === 'schematic' ? 'schematic' : 'image';
  if (!needsArcgisTacticalData()) {
    tacticalBaseReady = true;
    return;
  }
  const data = prepareArcgisData();
  if (!data) {
    tacticalBaseReady = true;
    return;
  }
  tacticalBuildQueued = true;
  const buildVersion = tacticalBuildVersion;
  const width = tacticalCanvas.width || WORLD_SIZE;
  const height = tacticalCanvas.height || WORLD_SIZE;
  const runStep = (step) => {
    window.setTimeout(() => {
      if (buildVersion !== tacticalBuildVersion) return;
      try {
        step();
      } catch (error) {
        tacticalBuildQueued = false;
        console.error('scheduleTacticalBaseBuild failed', error);
        setStatus('ArcGIS-Overlay konnte nicht vorbereitet werden. Fallback aktiv.');
      }
    }, 0);
  };
  const finishBuild = () => {
    if (buildVersion !== tacticalBuildVersion) return;
    tacticalBuildQueued = false;
    tacticalBaseReady = true;
    markDirty({ tacticalBase: true, influence: true, layers: true });
  };
  runStep(() => {
    if (layers.hyperlanes || layers.influence || layers.contested) {
      rebuildTacticalRouteCache(data, projectionMode);
    } else {
      tacticalRouteCache = [];
      tacticalTravelEdges = [];
    }
    runStep(() => {
      if (layers.grid) getTacticalSectionCanvas('grid', data, projectionMode, width, height);
      runStep(() => {
        if (layers.sectorLabels) getTacticalSectionCanvas('sectors', data, projectionMode, width, height);
        runStep(() => {
          if (layers.hyperlanes) getTacticalSectionCanvas('hyperlanes', data, projectionMode, width, height);
          runStep(() => {
            tacticalHoverAreas = layers.sectorLabels
              ? buildTacticalHoverAreas(data, projectionMode, viewMode)
              : { regions: [], sectors: [] };
            finishBuild();
          });
        });
      });
    });
  });
}

function renderTacticalBase() {
  const width = tacticalCanvas.width || WORLD_SIZE;
  const height = tacticalCanvas.height || WORLD_SIZE;
  tacticalCtx.clearRect(0, 0, width, height);
  tacticalOverlay.innerHTML = '';
  const data = needsArcgisTacticalData() ? prepareArcgisData() : null;
  const projectionMode = viewMode === 'schematic' ? 'schematic' : 'image';
  const needsRouteCacheBuild = layers.hyperlanes && !tacticalRouteCache.length;
  const needsHoverAreaBuild = layers.sectorLabels && !tacticalHoverAreas.sectors.length && !tacticalHoverAreas.regions.length;
  tacticalDebugRenderCount += 1;
  if (TACTICAL_DEBUG) {
    const canvasRect = tacticalCanvas.getBoundingClientRect();
    const overlayRect = tacticalOverlay.getBoundingClientRect();
    const worldRect = world.getBoundingClientRect();
    const viewportRect = viewport.getBoundingClientRect();
    const canvasStyle = getComputedStyle(tacticalCanvas);
    const overlayStyle = getComputedStyle(tacticalOverlay);
    const sampleArcPlanet = data?.planets?.[0] || null;
    const sampleProjected = sampleArcPlanet ? {
      image: projectArcgisToWorld(sampleArcPlanet.x, sampleArcPlanet.y, 'image'),
      schematic: projectArcgisToWorld(sampleArcPlanet.x, sampleArcPlanet.y, 'schematic')
    } : null;
    logTacticalDebug(`renderTacticalBase #${tacticalDebugRenderCount}`, {
      viewMode,
      layers: { ...layers },
      hasArcgisData: Boolean(data),
      mapAnalysisUnavailable,
      mapAnalysisReady: Boolean(mapAnalysis),
      canvas: {
        width,
        height,
        clientWidth: tacticalCanvas.clientWidth,
        clientHeight: tacticalCanvas.clientHeight,
        rect: { left: canvasRect.left, top: canvasRect.top, width: canvasRect.width, height: canvasRect.height },
        display: canvasStyle.display,
        visibility: canvasStyle.visibility,
        opacity: canvasStyle.opacity,
        zIndex: canvasStyle.zIndex
      },
      overlay: {
        childCount: tacticalOverlay.childNodes.length,
        rect: { left: overlayRect.left, top: overlayRect.top, width: overlayRect.width, height: overlayRect.height },
        display: overlayStyle.display,
        visibility: overlayStyle.visibility,
        opacity: overlayStyle.opacity,
        zIndex: overlayStyle.zIndex
      },
      world: {
        className: world.className,
        transform: world.style.transform,
        rect: { left: worldRect.left, top: worldRect.top, width: worldRect.width, height: worldRect.height }
      },
      viewport: {
        rect: { left: viewportRect.left, top: viewportRect.top, width: viewportRect.width, height: viewportRect.height }
      },
      sampleArcPlanet,
      sampleProjected
    });
  }
  if (data) {
    if (!tacticalBaseReady || needsRouteCacheBuild || needsHoverAreaBuild) {
      tacticalBaseReady = false;
      scheduleTacticalBaseBuild();
      return;
    }
    try {
      if (layers.grid) tacticalCtx.drawImage(getTacticalSectionCanvas('grid', data, projectionMode, width, height), 0, 0);
      if (layers.sectorLabels) tacticalCtx.drawImage(getTacticalSectionCanvas('sectors', data, projectionMode, width, height), 0, 0);
      if (layers.hyperlanes) tacticalCtx.drawImage(getTacticalSectionCanvas('hyperlanes', data, projectionMode, width, height), 0, 0);

      renderTacticalRouteInteraction();
      return;
    } catch (error) {
      console.error('renderTacticalBase failed', error);
      setStatus('ArcGIS-Overlay konnte nicht gerendert werden. Fallback aktiv.');
    }
  }

  const frag = document.createDocumentFragment();
  tacticalHoverAreas = buildTacticalHoverAreas(null, 'image', 'schematic');

  const columnCount = 24;
  const rowCount = 22;
  const colWidth = WORLD_SIZE / columnCount;
  const rowHeight = WORLD_SIZE / rowCount;

  if (layers.grid) {
    for (let col = 0; col <= columnCount; col += 1) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', col * colWidth);
      line.setAttribute('y1', 0);
      line.setAttribute('x2', col * colWidth);
      line.setAttribute('y2', WORLD_SIZE);
      line.setAttribute('class', 'grid-line');
      frag.appendChild(line);
    }
    for (let row = 0; row <= rowCount; row += 1) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', 0);
      line.setAttribute('y1', row * rowHeight);
      line.setAttribute('x2', WORLD_SIZE);
      line.setAttribute('y2', row * rowHeight);
      line.setAttribute('class', 'grid-line');
      frag.appendChild(line);
    }

    for (let col = 0; col < columnCount; col += 1) {
      const label = String.fromCharCode(65 + col);
      addSvgText(frag, { x: col * colWidth + colWidth / 2, y: 34, class: 'grid-label', 'text-anchor': 'middle' }, label);
    }
    for (let row = 0; row < rowCount; row += 1) {
      addSvgText(frag, { x: 18, y: row * rowHeight + rowHeight / 2 + 8, class: 'grid-label' }, String(row + 1));
    }
  }

  if (layers.grid) {
    [0.24, 0.39, 0.57, 0.76].forEach((scale) => {
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', WORLD_SIZE / 2);
      circle.setAttribute('cy', WORLD_SIZE / 2);
      circle.setAttribute('r', WORLD_SIZE * scale);
      circle.setAttribute('class', 'schematic-ring');
      frag.appendChild(circle);
    });
  }

  if (layers.hyperlanes) {
    routeCache.forEach(({ a, b }) => {
      const start = getSchematicPlanetPosition(a);
      const end = getSchematicPlanetPosition(b);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', start.x);
      line.setAttribute('y1', start.y);
      line.setAttribute('x2', end.x);
      line.setAttribute('y2', end.y);
      line.setAttribute('class', 'tactical-hyperlane');
      frag.appendChild(line);
    });
  }

  const regionGroups = new Map();
  const sectorGroups = new Map();
  state.planets.forEach((planet) => {
    const regionKey = planet.region || 'Unknown Region';
    if (!regionGroups.has(regionKey)) regionGroups.set(regionKey, []);
    regionGroups.get(regionKey).push(planet);

    const sectorName = planet.sector || '';
    if (sectorName) {
      const sectorKey = `${regionKey}::${sectorName}`;
      if (!sectorGroups.has(sectorKey)) sectorGroups.set(sectorKey, { region: regionKey, sector: sectorName, planets: [] });
      sectorGroups.get(sectorKey).planets.push(planet);
    }
  });

  if (layers.sectorLabels) {
    regionGroups.forEach((planets, region) => {
      if (planets.length < 6) return;
      const displayPlanets = planets.map(getSchematicPlanetPosition);
      const outline = expandHull(convexHull(displayPlanets), 1.06, 40);
      drawHull(frag, outline, 'region-outline');
    });

    sectorGroups.forEach(({ sector, planets }) => {
      if (planets.length < 3) return;
      const displayPlanets = planets.map(getSchematicPlanetPosition);
      const outline = expandHull(convexHull(displayPlanets), 1.03, 20);
      drawHull(frag, outline, 'sector-outline');
    });
  }

  tacticalOverlay.appendChild(frag);
  renderTacticalHoverLabels();
}

function applyViewMode() {
  const isSchematic = viewMode === 'schematic';
  world.classList.toggle('schematic', isSchematic);
  mapEl.style.display = isSchematic ? 'none' : 'block';
  influenceCanvas.style.display = 'block';
  influenceCanvas.style.opacity = '1';
  tacticalCanvas.style.display = 'block';
  tacticalCanvas.style.opacity = '1';
  tacticalOverlay.style.display = 'block';
  tacticalOverlay.style.opacity = '1';
  document.getElementById('viewModeBtn').textContent = isSchematic ? 'Image Map' : 'Schematic Map';
}

function applyLayers() {
  const isSchematic = viewMode === 'schematic';
  applyViewMode();
  planetLayer.classList.toggle('hidden', !layers.planets);
  const showLabels = layers.planetLabels && (zoom >= LABEL_ZOOM_THRESHOLD || isClusterZoomActive());
  planetLayer.classList.toggle('show-labels', showLabels);
  planetElements.forEach(({ label }) => {
    label.classList.toggle('is-hidden-by-zoom', layers.planetLabels && zoom < LABEL_ZOOM_THRESHOLD && !isClusterZoomActive());
  });
  overlay.classList.toggle('hide-hyperlanes', !layers.hyperlanes);
  overlay.classList.toggle('hide-contested', layers.hyperlanes && !layers.contested);
  fleetElements.forEach((el, fleetId) => {
    const fleet = fleetIndex.get(fleetId);
    const isVisible = fleet && ((fleet.faction === 'GAR' && layers.garFleets) || (fleet.faction === 'KUS' && layers.kusFleets));
    el.classList.toggle('hidden', !isVisible);
  });
  const showInfluenceCanvas = layers.influence;
  const showTacticalCanvas = isSchematic
    ? (layers.hyperlanes || layers.sectorLabels)
    : (layers.grid || layers.sectorLabels || layers.hyperlanes);
  const showTacticalOverlay = isSchematic
    ? (layers.grid || layers.hyperlanes || layers.sectorLabels)
    : (layers.hyperlanes || layers.sectorLabels);
  if (TACTICAL_DEBUG) {
    logTacticalDebug('applyLayers', {
      viewMode,
      isSchematic,
      zoom,
      layers: { ...layers },
      showInfluenceCanvas,
      showTacticalCanvas,
      showTacticalOverlay,
      mapDisplay: getComputedStyle(mapEl).display,
      mapOpacity: getComputedStyle(mapEl).opacity,
      influenceDisplayBefore: getComputedStyle(influenceCanvas).display,
      canvasDisplayBefore: getComputedStyle(tacticalCanvas).display,
      overlayDisplayBefore: getComputedStyle(tacticalOverlay).display
    });
  }
  influenceCanvas.classList.toggle('hidden', !showInfluenceCanvas);
  influenceCanvas.style.display = showInfluenceCanvas ? 'block' : 'none';
  tacticalCanvas.classList.toggle('hidden', !showTacticalCanvas);
  tacticalCanvas.style.display = showTacticalCanvas ? 'block' : 'none';
  tacticalOverlay.classList.toggle('hidden', !showTacticalOverlay);
  tacticalOverlay.style.display = showTacticalOverlay ? 'block' : 'none';
  renderTacticalHoverLabels();
  if (TACTICAL_DEBUG) {
    logTacticalDebug('applyLayers result', {
      influenceClass: influenceCanvas.className,
      influenceDisplayAfter: getComputedStyle(influenceCanvas).display,
      canvasClass: tacticalCanvas.className,
      canvasDisplayAfter: getComputedStyle(tacticalCanvas).display,
      overlayClass: tacticalOverlay.className,
      overlayDisplayAfter: getComputedStyle(tacticalOverlay).display,
      overlayChildren: tacticalOverlay.childNodes.length
    });
  }
}

function flushRender() {
  renderQueued = false;
  isRendering = true;
  try {
    if (dirtyTransform) {
      applyTransform();
      dirtyTransform = false;
    }
    if (dirtyPositions) {
      ensurePlanetElements();
      ensureFleetElements();
      dirtyPositions = false;
    }
    if (dirtyFrontline) {
      if (needsRouteNetwork()) {
        buildRouteCache();
        renderFrontline();
      } else {
        routeCache = [];
        tacticalRouteCache = [];
        tacticalTravelEdges = [];
        overlay.innerHTML = '';
      }
      renderTacticalBase();
      if (layers.influence) renderInfluenceClouds();
      dirtyFrontline = false;
      dirtyInfluence = false;
      dirtyTacticalBase = false;
      dirtyRouteOverlay = false;
    }
    if (dirtyTacticalBase) {
      renderTacticalBase();
      if (dirtyInfluence) {
        renderInfluenceClouds();
        dirtyInfluence = false;
      }
      dirtyTacticalBase = false;
    }
    if (dirtyInfluence) {
      renderInfluenceClouds();
      dirtyInfluence = false;
    }
    if (dirtyRouteOverlay) {
      renderFrontline();
      dirtyRouteOverlay = false;
    }
    if (dirtyLayers) {
      applyLayers();
      dirtyLayers = false;
    }
  } finally {
    isRendering = false;
  }
}

function render(options = { transform: true, positions: true, frontline: true, influence: true, layers: true }) {
  markDirty(options);
}

function renderAll(options = { transform: true, positions: true, frontline: true, influence: true, layers: true }) {
  render(options);
  if (renderQueued) flushRender();
}

function scheduleDeferredFullRender(delay = 60) {
  if (deferredFullRenderTimer) window.clearTimeout(deferredFullRenderTimer);
  deferredFullRenderTimer = window.setTimeout(() => {
    deferredFullRenderTimer = null;
    renderAll({ frontline: true, influence: true, layers: true });
  }, delay);
}

function renderBaseThenDeferHeavy() {
  renderAll({ transform: true, positions: true, layers: true });
  scheduleDeferredFullRender();
}

  const nameInput = document.getElementById(`shipName_${id}`);
  const commanderInput = document.getElementById(`shipCommander_${id}`);
  const fleetSelect = document.getElementById(`shipFleet_${id}`);
  const statusSelect = document.getElementById(`shipStatus_${id}`);
  const previousFleetId = ship.assignedFleetId || '';
  if (nameInput) ship.name = nameInput.value.trim() || ship.name;
  if (commanderInput) ship.commander = commanderInput.value.trim();
  let nextFleet = null;
  if (fleetSelect) {
    nextFleet = state.fleets.find((entry) => entry.id === fleetSelect.value);
    ship.assignedFleetId = nextFleet && nextFleet.faction === ship.faction ? nextFleet.id : '';
  }
  if (statusSelect) ship.status = statusSelect.value;
  const sourceFleet = previousFleetId ? state.fleets.find((entry) => entry.id === previousFleetId) : null;
  const nextFleetId = ship.assignedFleetId || '';
  if (sourceFleet && nextFleetId && nextFleetId !== previousFleetId) {
    ship.assignedFleetId = previousFleetId;
    animateShipTransferBetweenFleets(ship, sourceFleet, nextFleet);
    return;
  }
  normalizeFleetShipAssignments();
  saveLocal();
  playAudioCue(datapadAcceptAudio);
  rebuildIndexes();
  render({ positions: true, layers: true });
  renderFleetManagementView();

function startBuildOrder() {
  const classId = document.getElementById('shipyardClass')?.value;
  const locationPlanetId = document.getElementById('shipyardLocation')?.value;
  const shipName = document.getElementById('shipyardName')?.value.trim();
  const meta = getShipClassMeta(classId);
  const planet = planetIndex.get(locationPlanetId);
  const faction = getActiveShipyardFaction();
  const role = currentRole();
  if (role === 'Viewer') {
    setStatus('Viewer können keine Schiffe bauen.');
    return;
  }
  if (role === 'Republic Navy / GAR' && faction !== 'GAR') {
    setStatus('Republic Navy kann nur GAR-Schiffe bauen.');
    return;
  }
  if (role === 'Eventleiter / KUS' && faction !== 'KUS') {
    setStatus('Eventleitung kann hier nur KUS-Schiffe bauen.');
    return;
  }
  if (!meta || !planet) {
    setStatus('Bitte Schiffsklasse und Bauort wählen.');
    return;
  }
  if ((meta.faction || 'GAR') !== faction) {
    setStatus('Diese Schiffsklasse gehört nicht zur aktiven Fraktion.');
    return;
  }
  if (planet.owner !== faction) {
    setStatus(`Bauort muss ${faction}-kontrolliert sein.`);
    return;
  }
  const validLocations = new Set(getAvailableBuildLocations(classId).map((entry) => entry.id));
  if (!validLocations.has(locationPlanetId)) {
    setStatus('Dieser Bauort ist für die gewählte Klasse nicht erlaubt.');
    return;
  }
  if (faction === 'GAR' && !spendResources(meta.cost)) {
    setStatus('Nicht genug Ressourcen für diesen Bauauftrag.');
    renderShipyardView();
    return;
  }
  if (faction === 'KUS') {
    const ship = createReadyShipFromBuild({
      classId,
      shipName: shipName || meta.displayName,
      faction,
      locationPlanetId,
      createdFrom: 'shipyard_instant'
    });
    if (!ship) {
      setStatus('KUS-Schiff konnte nicht erzeugt werden.');
      return;
    }
    saveLocal();
    playAudioCue(datapadAcceptAudio);
    renderShipyardView();
    if (activeMainTab === 'fleetManagement') renderFleetManagementView();
    setStatus(`KUS-Spawn sofort bereit: ${ship.name} in ${planet.name}`);
    return;
  }
  state.buildJobs.push(createBuildJobRecord({
    classId,
    shipName: shipName || meta.displayName,
    buildLocationPlanetId: locationPlanetId,
    startedAt: Date.now(),
    finishesAt: Date.now() + (meta.buildTimeHours * RESOURCE_PRODUCTION_TICK_MS),
    faction
  }));
  saveLocal();
  playAudioCue(datapadAcceptAudio);
  renderShipyardView();
  setStatus(`Bau gestartet: ${shipName || meta.displayName} in ${planet.name}`);
}

function importTrelloFromFileInput(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const payload = JSON.parse(String(reader.result || '{}'));
      importTrelloData(payload);
    } catch (error) {
      setStatus('Trello-JSON konnte nicht gelesen werden.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function triggerTrelloImport() {
  if (!isAdminRole()) {
    setStatus('Trello-Import ist nur für Admin verfügbar.');
    return;
  }
  let input = document.getElementById('trelloImportInput');
  if (!input) {
    input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.id = 'trelloImportInput';
    input.className = 'hidden';
    input.addEventListener('change', importTrelloFromFileInput);
    document.body.appendChild(input);
  }
  input.click();
}

function triggerFleetManagementSearch() {
  const query = normalizeSearchText(document.getElementById('fleetMgmtSearch')?.value || '');
  fleetManagementSearchQuery = document.getElementById('fleetMgmtSearch')?.value || '';
  const activeChoice = fleetManagementSearchResultsState[Math.max(0, fleetManagementSearchActiveIndex)];
  if (activeChoice) {
    applyFleetManagementSearchChoice(activeChoice);
    return;
  }
  if (!query) {
    setStatus('Bitte einen Verband, Schiffsnamen, CO oder eine Klasse eingeben.');
    return;
  }
  const candidates = getFleetManagementSearchCandidates().filter((choice) => choice.search.includes(query));
  const exact = candidates.find((choice) => normalizeSearchText(choice.label) === query);
  const result = exact || candidates[0];
  if (!result) {
    setStatus('Kein passender Verband oder kein passendes Schiff gefunden.');

function deleteFleetManagementFleet(id) {
  const fleet = fleetIndex.get(id) || state.fleets.find((entry) => entry.id === id);
  if (!fleet || !canEditFaction(fleet.faction)) return;
  const assignedShips = state.ships.filter((ship) => ship.assignedFleetId === fleet.id);
  assignedShips.forEach((ship) => {
    ship.assignedFleetId = '';
  });
  fleetTravelState.delete(fleet.id);
  removeFleetMotionRecord(fleet.id);
  emitLiveSocketEvent('fx:fleet-delete', { fleetId: fleet.id });
  state.fleets = state.fleets.filter((entry) => entry.id !== fleet.id);
  normalizeFleetShipAssignments();
  rebuildFleetRenderPositions();
  rebuildIndexes();
  saveLocal();
  playAudioCue(datapadDeleteAudio);
  if (selected?.type === 'fleet' && selected.id === fleet.id) closeInfoPanel();
  render({ positions: true, layers: true });
  renderFleetManagementView();
  setStatus(`Verband gelöscht: ${fleet.name}. ${assignedShips.length} Schiff(e) zurück im Pool.`);
}

function animateShipTransferBetweenFleets(ship, sourceFleet, targetFleet) {
  const sourcePosition = sourceFleet ? getFleetDisplayPosition(sourceFleet) : null;
  const targetPosition = targetFleet ? getFleetDisplayPosition(targetFleet) : null;
  const sourcePlanetId = sourceFleet?.locationPlanetId || sourceFleet?.planetId || '';
  const targetPlanetId = targetFleet?.locationPlanetId || targetFleet?.planetId || '';
  if (!ship || !sourceFleet || !targetFleet || !sourcePosition || !targetPosition) {
    ship.assignedFleetId = targetFleet?.id || '';
    ship.locationPlanetId = targetFleet?.locationPlanetId || targetFleet?.planetId || ship.locationPlanetId;
    normalizeFleetShipAssignments();
    rebuildIndexes();
    saveLocal();
    render({ positions: true, layers: true });
    if (activeMainTab === 'fleetManagement') renderFleetManagementView();
    if (selected?.type === 'fleet' && (selected.id === sourceFleet?.id || selected.id === targetFleet?.id)) openFleet(selected.id);
    return;
  }
  const token = document.createElement('div');
  token.className = 'fleet-transfer-token';
  token.style.left = `${sourcePosition.x}px`;
  token.style.top = `${sourcePosition.y}px`;
  token.innerHTML = `<img src="${iconFor(targetFleet)}" alt="">`;
  fxLayer.appendChild(token);
  playAudioCue(hyperspaceStartAudio);
  ship.assignedFleetId = '';
  normalizeFleetShipAssignments();
  saveLocal();
  if (activeMainTab === 'fleetManagement') renderFleetManagementView();
  if (selected?.type === 'fleet' && (selected.id === sourceFleet.id || selected.id === targetFleet.id)) openFleet(selected.id);
  const fallbackPoints = [sourcePosition, targetPosition];
  const routePlan = sourcePlanetId && targetPlanetId && sourcePlanetId !== targetPlanetId
    ? findFleetTravelPlan(sourcePlanetId, targetPlanetId)
    : null;
  const points = routePlan?.points?.length ? routePlan.points : fallbackPoints;
  const totalLength = routePlan?.totalLength || distanceBetweenPoints(sourcePosition, targetPosition);
  const duration = Math.max(6000, Math.min(45000, (Math.max(180, totalLength) / FLEET_TRAVEL_REFERENCE_DISTANCE) * FLEET_TRAVEL_REFERENCE_DURATION_MS));
  let finishAudioPlayed = false;
  const playFinishIfNeeded = () => {
    if (finishAudioPlayed) return;
    finishAudioPlayed = true;
    playAudioCue(hyperspaceFinishAudio);
  };
  const finalizeTransfer = () => {
    token.remove();
    playFinishIfNeeded();
    ship.assignedFleetId = targetFleet.id;
    ship.locationPlanetId = targetFleet.locationPlanetId || targetFleet.planetId || ship.locationPlanetId;
    normalizeFleetShipAssignments();
    rebuildIndexes();
    saveLocal();
    render({ positions: true, layers: true });
    if (activeMainTab === 'fleetManagement') renderFleetManagementView();
    if (selected?.type === 'fleet' && (selected.id === sourceFleet.id || selected.id === targetFleet.id)) openFleet(selected.id);
    setStatus(`Schiff umverlegt: ${ship.name} -> ${targetFleet.name}`);
  };
  const startedAt = performance.now();
  const tickTransfer = (now) => {
    const elapsed = now - startedAt;
    const movementElapsed = Math.max(0, elapsed - FLEET_HYPERSPACE_START_DELAY_MS);
    const linearProgress = clamp(movementElapsed / duration, 0, 1);
    const distance = totalLength * linearProgress;
    const point = samplePolylineAtDistance(points, distance);
    token.style.left = `${point.x}px`;
    token.style.top = `${point.y}px`;
    if (elapsed < FLEET_HYPERSPACE_START_DELAY_MS) {
      token.style.opacity = String(clamp(elapsed / 450, 0, 1));
      token.style.transform = 'translate(-50%, -50%) scale(1)';
    } else {
      token.style.opacity = linearProgress > 0.94 ? String((1 - linearProgress) / 0.06) : '1';
      token.style.transform = 'translate(-50%, -50%) scale(0.92)';
    }
    if (!finishAudioPlayed && elapsed >= Math.max(FLEET_HYPERSPACE_START_DELAY_MS, (duration + FLEET_HYPERSPACE_START_DELAY_MS) - FLEET_HYPERSPACE_FINISH_LEAD_MS)) {
      playFinishIfNeeded();
    }
    if (linearProgress >= 1) {
      finalizeTransfer();
      return;
    }
    requestAnimationFrame(tickTransfer);
  };
  requestAnimationFrame(tickTransfer);
}

function createLoginManagerUser() {
  if (!isAdminRole()) return;
  state.authUsers.push({
    id: `auth_${Math.random().toString(36).slice(2, 10)}`,
    username: '',
    password: '',
    role: 'Viewer',
    isDraft: true
  });
  renderLoginManagerView();
}

async function saveLoginManagerUser(id) {
  if (!isAdminRole()) return;
  const user = state.authUsers.find((entry) => entry.id === id);
  if (!user) return;
  const username = document.getElementById(`authUser_${id}`)?.value.trim() || '';
  const password = document.getElementById(`authPass_${id}`)?.value || '';
  const role = document.getElementById(`authRole_${id}`)?.value || 'Viewer';
  if (!username || !password) {
    setStatus('Login-Name und Passwort dürfen nicht leer sein.');
    return;
  }
  const duplicate = state.authUsers.find((entry) => entry.id !== id && entry.username.trim().toLowerCase() === username.toLowerCase());
  if (duplicate) {
    setStatus('Dieser Login-Name existiert bereits.');
    return;
  }
  try {
    const response = await fetch(user.isDraft ? '/api/admin/users' : `/api/admin/users/${id}`, {
      method: user.isDraft ? 'POST' : 'PATCH',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username,
        password,
        role: ['Admin', 'Eventleiter / KUS', 'Republic Navy / GAR', 'Viewer'].includes(role) ? role : 'Viewer'
      })
    });
    const payload = await response.json();
    if (!response.ok) throw new Error(payload.error || 'Login konnte nicht gespeichert werden.');
    state.authUsers = payload.users || [];
    renderLoginManagerView();
    setStatus(`Login gespeichert: ${username}`);
  } catch (error) {
    setStatus(`Login speichern fehlgeschlagen: ${error.message}`);
  }
}

async function deleteLoginManagerUser(id) {
  if (!isAdminRole()) return;
  const user = state.authUsers.find((entry) => entry.id === id);
  if (user?.isDraft) {
    state.authUsers = state.authUsers.filter((entry) => entry.id !== id);
    renderLoginManagerView();
    setStatus('Entwurf entfernt.');
    return;
  }
  try {
    const response = await fetch(`/api/admin/users/${id}`, {
      method: 'DELETE',
      credentials: 'include'
    });
    const payload = await response.json();
    if (!response.ok) throw new Error(payload.error || 'Login konnte nicht gelöscht werden.');
    state.authUsers = payload.users || [];
    renderLoginManagerView();
    setStatus(user ? `Login gelöscht: ${user.username}` : 'Login gelöscht.');
  } catch (error) {
    setStatus(`Login löschen fehlgeschlagen: ${error.message}`);
  }
}
