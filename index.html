<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galactic Campaign Command Board - MVP</title>
<style>
:root {
  --bg:#05070b; --panel:#1d2027; --panel2:#2b2f38; --text:#e9edf5; --muted:#9aa4b3;
  --gar:#1f7cff; --kus:#d03632; --neutral:#f0d44b; --line:#ffffff;
}
* { box-sizing:border-box; }
body { margin:0; background:#05070b; color:var(--text); font-family: Inter, Segoe UI, Arial, sans-serif; overflow:hidden; }
#app { position:relative; width:100vw; height:100vh; background:#000; }
#viewport { position:absolute; inset:0; overflow:hidden; cursor:grab; touch-action:none; }
#viewport.dragging { cursor:grabbing; }
#world { position:absolute; left:0; top:0; width:2048px; height:2048px; transform-origin:0 0; will-change:transform; }
#world.schematic { background:#07192a; }
#map { position:absolute; left:0; top:0; width:2048px; height:2048px; user-select:none; pointer-events:none; z-index:1; }
#influenceCanvas { position:absolute; left:0; top:0; width:2048px; height:2048px; pointer-events:none; z-index:2; }
#tacticalCanvas { position:absolute; left:0; top:0; width:2048px; height:2048px; pointer-events:none; z-index:3; }
#tacticalOverlay { position:absolute; left:0; top:0; width:2048px; height:2048px; pointer-events:none; overflow:visible; z-index:4; }
#overlay { position:absolute; left:0; top:0; width:2048px; height:2048px; pointer-events:auto; overflow:visible; z-index:7; }
#overlay.hide-hyperlanes .frontLine,
#overlay.hide-hyperlanes .route-hitbox.frontLine,
#overlay.hide-hyperlanes .contestedLine,
#overlay.hide-hyperlanes .route-hitbox.contestedLine { display:none; pointer-events:none; }
#overlay.hide-contested .contestedLine,
#overlay.hide-contested .route-hitbox.contestedLine { display:none; pointer-events:none; }
#planetLayer { position:absolute; inset:0; z-index:5; pointer-events:auto; }
#fleetLayer { position:absolute; inset:0; z-index:8; }
#fxLayer { position:absolute; inset:0; z-index:16; pointer-events:none; overflow:visible; }
.grid-line { stroke:rgba(88,222,255,.6); stroke-width:1.15; }
.grid-label { fill:rgba(133,240,255,.6); font-size:20px; font-weight:700; letter-spacing:1px; opacity:.6; }
.region-label { fill:rgba(255,236,106,.98); font-size:56px; font-weight:700; letter-spacing:1px; text-anchor:middle; }
.sector-label { fill:rgba(224,236,255,.92); font-size:19px; font-weight:600; text-anchor:middle; }
.tactical-hover-label { pointer-events:none; text-anchor:middle; paint-order:stroke; }
.tactical-hover-label.region { fill:rgba(255,236,106,.98); font-size:52px; font-weight:700; stroke:rgba(0,0,0,.55); stroke-width:5px; letter-spacing:1px; }
.tactical-hover-label.sector { fill:rgba(224,236,255,.96); font-size:19px; font-weight:700; stroke:rgba(0,0,0,.62); stroke-width:3px; }
.schematic-ring { fill:none; stroke:rgba(123,143,165,.3); stroke-width:2.5; }
.region-outline { fill:rgba(247,231,104,.06); stroke:rgba(255,232,92,.72); stroke-width:2.8; }
.sector-outline { fill:rgba(121,163,212,.06); stroke:rgba(170,214,255,.78); stroke-width:2; }
.tactical-hyperlane { stroke:rgba(255,145,32,.98); stroke-width:4; stroke-linecap:round; stroke-dasharray:10 8; fill:none; }
.tactical-route-highlight { fill:none; stroke-linecap:round; stroke-linejoin:round; pointer-events:none; }
.tactical-route-highlight.hover { stroke:rgba(120,220,255,.92); stroke-width:8; stroke-dasharray:10 8; }
.tactical-route-highlight.selected { stroke:rgba(255,255,255,.92); stroke-width:8; stroke-dasharray:10 8; }
.tactical-grid-path { fill:none; stroke:rgba(190,212,236,.42); stroke-width:1.2; }
.planet-label.is-hidden-by-zoom { display:none !important; }
.planet { position:absolute; width:13px; height:13px; border:1px solid white; border-radius:50%; transform:translate(-50%,-50%); cursor:pointer; pointer-events:auto; box-shadow:0 0 8px rgba(255,255,255,.5); }
.planet.priority-world { width:18px; height:18px; background:#2cd66b !important; border-width:2px; box-shadow:0 0 12px rgba(44,214,107,.85); z-index:8; }
.planet.GAR { background:var(--gar); }
.planet.KUS { background:var(--kus); }
.planet.NEUTRAL { background:var(--neutral); }
.planet:hover { width:18px; height:18px; z-index:7; }
.planet.priority-world:hover { width:22px; height:22px; z-index:9; }
.planet-label { position:absolute; transform:translate(6px,-10px); font-size:11px; color:#dfe7ff; text-shadow:0 1px 3px #000, 0 0 2px #000; pointer-events:none; white-space:nowrap; display:none; }
.planet-label.priority-world { color:#b8ffc8; font-weight:700; }
.show-labels .planet-label { display:block; }
.planet-label.hover-visible { display:block !important; }
.fleet { position:absolute; width:29px; height:29px; transform:translate(-50%,-50%); border-radius:50%; cursor:grab; pointer-events:auto; z-index:10; filter:drop-shadow(0 0 8px #000); opacity:.68; }
.fleet.dragging { cursor:grabbing; opacity:.88; }
.fleet.selected { opacity:.96; z-index:12; }
.fleet.moving { pointer-events:none; opacity:1; cursor:default; z-index:14; filter:drop-shadow(0 0 12px rgba(255,255,255,.35)); }
.fleet img { width:100%; height:100%; pointer-events:none; opacity:.82; }
.fleet.selected img { opacity:1; }
.fleet .fleet-tag { position:absolute; left:31px; top:4px; padding:2px 7px; border-radius:8px; background:rgba(0,0,0,.72); font-size:12px; white-space:nowrap; border:1px solid rgba(255,255,255,.2); display:none; }
.fleet.selected .fleet-tag { display:block; }
.planet.snap-target { width:20px; height:20px; outline:2px solid #fff; z-index:9; }
.lane { opacity:.5; filter:drop-shadow(0 0 5px rgba(0,0,0,.9)); }
.lane.blue { stroke:var(--gar); }
.lane.red { stroke:var(--kus); }
.lane.purple { stroke:#9c43ff; opacity:.72; }
.lane.route-hovered { stroke-width:8 !important; opacity:1 !important; filter:drop-shadow(0 0 10px rgba(255,255,255,.55)); }
.lane.route-selected { stroke-width:8 !important; opacity:1 !important; filter:drop-shadow(0 0 8px rgba(255,255,255,.45)); }
.route-hitbox { pointer-events:stroke; cursor:pointer; }
.toolstack { position:absolute; top:22px; left:22px; display:flex; flex-direction:column; gap:8px; z-index:40; }
.toolbtn { width:42px; height:42px; background:#2b2f38; color:#dce7f7; border:1px solid #3a4150; font-size:23px; border-radius:2px; cursor:pointer; }
.toolbtn:hover { background:#3a4150; }
#homeBtn { position:absolute; top:22px; right:22px; z-index:40; font-size:18px; }
.panel { position:absolute; z-index:35; background:rgba(29,32,39,.96); border:1px solid #3c4350; box-shadow:0 16px 45px rgba(0,0,0,.5); border-radius:8px; backdrop-filter: blur(8px); }
#layersPanel { top:75px; left:75px; width:290px; display:none; padding:10px; }
.layer-row { display:flex; align-items:center; gap:11px; padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.06); color:#e8edf7; }
.layer-row input { transform:scale(1.1); }
.layer-row .handle { color:#7a8291; font-size:19px; }
#addPanel { top:75px; left:75px; width:330px; display:none; padding:14px; }
#infoPanel { top:85px; right:20px; width:360px; max-height:calc(100vh - 120px); overflow:auto; display:none; padding:16px; }
h2,h3 { margin:0 0 12px; }
small,.muted { color:var(--muted); }
.form-row { margin:10px 0; display:flex; flex-direction:column; gap:5px; }
input, select, textarea, button { font-family:inherit; }
input, select, textarea { width:100%; background:#12151b; color:var(--text); border:1px solid #3c4350; border-radius:6px; padding:9px; }
textarea { min-height:82px; resize:vertical; }
.primary { background:#315dff; border:0; color:white; padding:10px 12px; border-radius:8px; cursor:pointer; font-weight:700; }
.secondary { background:#2b2f38; border:1px solid #3c4350; color:white; padding:9px 12px; border-radius:8px; cursor:pointer; }
.danger { background:#67201e; }
#topbar { position:absolute; left:82px; top:22px; z-index:30; display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:rgba(10,13,20,.72); border:1px solid rgba(255,255,255,.12); padding:10px 12px; border-radius:8px; }
#roleSelect { width:190px; padding:6px; }
.topbar-auth { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.topbar-auth input { width:160px; padding:7px 9px; }
.role-faction-badge { display:inline-flex; align-items:center; gap:8px; min-height:38px; padding:7px 10px; border:1px solid rgba(255,255,255,.12); border-radius:10px; background:rgba(255,255,255,.04); }
.role-faction-badge img { width:26px; height:26px; object-fit:contain; }
.role-faction-badge strong { margin:0; font-size:12px; letter-spacing:.08em; text-transform:uppercase; }
.panel-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px; }
.panel-head h2 { margin:0; }
.panel-close { width:34px; min-width:34px; height:34px; padding:0; border-radius:999px; border:1px solid rgba(255,255,255,.16); background:rgba(255,255,255,.05); color:#fff; font-size:18px; line-height:1; cursor:pointer; }
.panel-close:hover { background:rgba(255,255,255,.12); }
.search-wrap { position:relative; width:260px; }
#planetSearch { width:100%; padding:8px 10px; }
#planetSearchResults { position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:60; max-height:320px; overflow:auto; background:rgba(18,21,27,.98); border:1px solid #3c4350; border-radius:10px; box-shadow:0 18px 45px rgba(0,0,0,.45); }
.search-result { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.06); cursor:pointer; }
.search-result:last-child { border-bottom:0; }
.search-result strong { display:block; font-size:14px; }
.search-result small { display:block; margin-top:2px; }
.search-result.active,
.search-result:hover { background:rgba(49,93,255,.18); }
.inline-search-wrap { position:relative; }
.inline-search-results { position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:70; max-height:240px; overflow:auto; background:rgba(18,21,27,.98); border:1px solid #3c4350; border-radius:10px; box-shadow:0 18px 45px rgba(0,0,0,.45); }
.fx-particle { position:absolute; left:0; top:0; width:14px; height:14px; transform:translate(-50%,-50%); pointer-events:none; will-change:transform,opacity; }
.fx-particle.triangle { clip-path:polygon(50% 0%, 0% 100%, 100% 100%); }
.fx-particle.quad { clip-path:polygon(12% 8%, 88% 14%, 84% 92%, 10% 86%); }
.fx-ring { position:absolute; left:0; top:0; border-radius:50%; border:2px solid rgba(255,255,255,.75); transform:translate(-50%,-50%); pointer-events:none; will-change:transform,opacity; }
.badge { display:inline-block; padding:3px 8px; border-radius:999px; background:#303642; margin-right:5px; font-size:12px; }
.badge.GAR { background:rgba(31,124,255,.25); color:#aecdff; }
.badge.KUS { background:rgba(208,54,50,.25); color:#ffc2c0; }
.badge.NEUTRAL { background:rgba(240,212,75,.25); color:#fff2a0; }
#statusbar { position:absolute; left:0; right:0; bottom:0; z-index:45; height:26px; padding:5px 10px; background:rgba(0,0,0,.62); color:#a9b5c9; font-size:12px; display:flex; justify-content:space-between; }
.main-nav { position:absolute; left:22px; bottom:42px; z-index:44; display:flex; gap:8px; }
.main-tab-btn { min-width:128px; padding:12px 14px; border-radius:10px; border:1px solid rgba(255,255,255,.14); background:rgba(12,16,24,.92); color:#edf4ff; font-weight:700; cursor:pointer; box-shadow:0 12px 28px rgba(0,0,0,.28); }
.main-tab-btn.active { background:#315dff; border-color:#5f82ff; }
#workspacePanel { position:absolute; left:82px; right:20px; top:85px; bottom:42px; z-index:34; display:none; padding:18px; overflow:auto; background:rgba(15,18,25,.95); border:1px solid rgba(255,255,255,.08); border-radius:16px; box-shadow:0 22px 60px rgba(0,0,0,.38); backdrop-filter:blur(10px); }
#workspacePanel.active { display:block; }
.workspace-head { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:18px; }
.workspace-head h2 { margin:0 0 6px; }
.workspace-head p { margin:0; color:var(--muted); }
.workspace-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin-bottom:18px; }
.stat-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:14px; }
.stat-card strong { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.06em; }
.stat-card span { font-size:24px; font-weight:800; }
.workspace-section { margin-bottom:20px; }
.workspace-section h3 { margin:0 0 10px; }
.workspace-columns { display:grid; grid-template-columns:1.05fr .95fr; gap:18px; }
.workspace-card { background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:14px; }
.workspace-card.compact { padding:12px; }
.toolbar-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
.toolbar-row.end { justify-content:flex-end; }
.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table th, .data-table td { text-align:left; padding:9px 10px; border-bottom:1px solid rgba(255,255,255,.07); vertical-align:top; }
.data-table th { color:#b9c4d6; font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
.data-table input, .data-table select { padding:7px 8px; font-size:13px; }
.data-table .actions { display:flex; gap:8px; flex-wrap:wrap; }
.muted-box { padding:12px; border:1px dashed rgba(255,255,255,.16); border-radius:12px; color:var(--muted); }
.warning-list { margin:0; padding-left:18px; color:#ffcf9d; }
.warning-list li { margin:4px 0; }
.resource-slot-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.resource-pill { display:inline-flex; align-items:center; gap:6px; padding:5px 9px; border-radius:999px; background:rgba(69,123,255,.12); color:#cfe0ff; border:1px solid rgba(69,123,255,.24); font-size:12px; margin:0 6px 6px 0; }
.fleet-card-list { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:12px; }
.fleet-card { background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:14px; }
.fleet-card h4 { margin:0 0 8px; font-size:17px; }
.fleet-card p { margin:6px 0; color:var(--muted); font-size:13px; }
.fleet-card .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.fleet-transfer-token { position:absolute; width:18px; height:18px; transform:translate(-50%,-50%); pointer-events:none; z-index:20; filter:drop-shadow(0 0 10px rgba(255,255,255,.45)); }
.fleet-transfer-token img { width:100%; height:100%; display:block; opacity:.95; }
.focus-highlight { position:relative; outline:2px solid rgba(255,214,102,.95); outline-offset:4px; box-shadow:0 0 0 5px rgba(255,214,102,.18), 0 0 24px rgba(255,214,102,.28); border-radius:14px; animation:focusPulse 1.1s ease-in-out infinite; }
.focus-highlight-row { outline:2px solid rgba(255,214,102,.95); outline-offset:-2px; box-shadow:inset 0 0 0 999px rgba(255,214,102,.08); animation:focusPulse 1.1s ease-in-out infinite; }
@keyframes focusPulse {
  0%, 100% { box-shadow:0 0 0 5px rgba(255,214,102,.18), 0 0 24px rgba(255,214,102,.28); }
  50% { box-shadow:0 0 0 8px rgba(255,214,102,.1), 0 0 30px rgba(255,214,102,.4); }
}
.mini-btn { background:#232937; color:#eef4ff; border:1px solid rgba(255,255,255,.11); border-radius:8px; padding:8px 10px; cursor:pointer; }
.mini-btn.primary { background:#315dff; border-color:#5174ff; }
.mini-btn.danger { background:#5b2024; border-color:#884248; }
.split-inline { display:flex; gap:10px; flex-wrap:wrap; }
.split-inline > * { flex:1 1 180px; }
.workspace-hidden { display:none !important; }
.hidden { display:none !important; pointer-events:none !important; }
a { color:#8bc7ff; }
</style>
</head>
<body>
<div id="app">
  <div id="viewport">
    <div id="world">
      <img id="map" src="assets/GFFA-high.jpg" alt="Galaxy Map">
      <canvas id="influenceCanvas" width="2048" height="2048"></canvas>
      <canvas id="tacticalCanvas" width="2048" height="2048"></canvas>
      <svg id="tacticalOverlay" viewBox="0 0 2048 2048" preserveAspectRatio="none"></svg>
      <svg id="overlay" viewBox="0 0 2048 2048" preserveAspectRatio="none"></svg>
      <div id="fxLayer"></div>
      <div id="planetLayer"></div>
      <div id="fleetLayer"></div>
    </div>
  </div>

  <div class="toolstack">
    <button class="toolbtn" id="zoomIn">+</button>
    <button class="toolbtn" id="zoomOut">−</button>
    <button class="toolbtn" id="layersBtn">≪</button>
  </div>
  <button class="toolbtn" id="homeBtn">⌂</button>

  <div id="topbar">
    <strong>Galactic Campaign Board</strong>
    <span class="muted">Rolle:</span>
    <select id="roleSelect">
      <option>Admin</option>
      <option>Eventleiter / KUS</option>
      <option>Republic Navy / GAR</option>
      <option selected>Viewer</option>
    </select>
    <div class="topbar-auth">
      <input id="loginUser" type="text" placeholder="Benutzername" autocomplete="username">
      <input id="loginPassword" type="password" placeholder="Passwort" autocomplete="current-password">
      <button class="secondary" id="loginBtn">Login</button>
    </div>
    <div id="roleFactionBadge" class="role-faction-badge hidden"></div>
    <div class="search-wrap">
      <input id="planetSearch" type="search" placeholder="Planeten suchen..." autocomplete="off">
      <div id="planetSearchResults" class="hidden"></div>
    </div>
    <button class="secondary" id="viewModeBtn">Schematic Map</button>
    <button class="secondary" id="saveBtn">Export JSON</button>
  </div>

  <div id="layersPanel" class="panel">
    <h3>Schichten</h3>
    <label class="layer-row"><span class="handle">⋮⋮</span><input type="checkbox" data-layer="planets" checked> Planeten</label>
    <label class="layer-row"><span class="handle">⋮⋮</span><input type="checkbox" data-layer="planetLabels"> Planetennamen</label>
    <label class="layer-row"><span class="handle">⋮⋮</span><input type="checkbox" data-layer="influence" checked> Frontline / Influence</label>
    <label class="layer-row"><span class="handle">⋮⋮</span><input type="checkbox" data-layer="hyperlanes" checked> Hyperraum-Routen</label>
    <label class="layer-row"><span class="handle">⋮⋮</span><input type="checkbox" data-layer="contested" checked> Contested / Neutral Overlay</label>
    <label class="layer-row"><span class="handle">⋮⋮</span><input type="checkbox" data-layer="garFleets" checked> GAR-Flotten</label>
    <label class="layer-row"><span class="handle">⋮⋮</span><input type="checkbox" data-layer="kusFleets" checked> KUS-Flotten</label>
    <label class="layer-row"><span class="handle">⋮⋮</span><input type="checkbox" data-layer="grid" checked> Raster</label>
    <label class="layer-row"><span class="handle">⋮⋮</span><input type="checkbox" data-layer="sectorLabels" checked> Sektoren / Regionen</label>
  </div>

  <div id="infoPanel" class="panel"></div>

  <div id="workspacePanel"></div>

  <div class="main-nav">
    <button class="main-tab-btn active" data-main-tab="map">Map</button>
    <button class="main-tab-btn" data-main-tab="fleetManagement">Flottenmanagement</button>
    <button class="main-tab-btn" data-main-tab="shipyard">Schiffbau</button>
    <button class="main-tab-btn hidden" id="loginManagerTabBtn" data-main-tab="loginManager">Login Manager</button>
  </div>

  <div id="statusbar">
    <span id="statusLeft">MVP v2: Flotten snappen auf Sternsysteme. Alt+Drag als Admin kalibriert Planetenpositionen.</span>
    <span>Map attribution: W. R. van Hage / CC-BY-SA & GFDL • Powered by your campaign logic</span>
  </div>
</div>

<script src="assets/arcgis-compact.js"></script>

function median(values) {
  if (!values.length) return null;
  const sorted = [...values].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
}

function parseGrid(grid) {
  const match = String(grid || '').trim().toUpperCase().match(/^([A-Z])(?:-?(\d+))$/);
  if (!match) return null;
  return { col: match[1], row: Number(match[2]) };
}

function stableHash(text) {
  let hash = 0;
  const value = String(text || '');
  for (let i = 0; i < value.length; i += 1) {
    hash = ((hash << 5) - hash) + value.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

function normalizePlanetKey(text) {

}

function normalizeSearchText(text) {

function getPlanetSearchAliases(planet) {

  if (planet.id) aliases.push(String(planet.id).replace(/_/g, ' '));
  return aliases.join(' ');
}

function polylineLength(points) {
  let total = 0;
  for (let i = 1; i < points.length; i += 1) total += distanceBetweenPoints(points[i - 1], points[i]);
  return total;
}

function samplePolylineAtDistance(points, distance) {
  if (!Array.isArray(points) || !points.length) return { x: 0, y: 0 };
  if (points.length === 1) return points[0];
  let remaining = clamp(distance, 0, polylineLength(points));
  for (let i = 1; i < points.length; i += 1) {
    const start = points[i - 1];
    const end = points[i];
    const segmentLength = distanceBetweenPoints(start, end);
    if (segmentLength <= 1e-6) continue;
    if (remaining <= segmentLength) {
      const t = remaining / segmentLength;
      return {
        x: start.x + ((end.x - start.x) * t),
        y: start.y + ((end.y - start.y) * t)
      };
    }
    remaining -= segmentLength;
  }
  return points[points.length - 1];
}

function averagePoints(points) {
  if (!points.length) return { x: WORLD_SIZE / 2, y: WORLD_SIZE / 2 };
  const total = points.reduce((acc, point) => ({ x: acc.x + point.x, y: acc.y + point.y }), { x: 0, y: 0 });
  return { x: total.x / points.length, y: total.y / points.length };
}

function findClusterZoomCandidate(x, y) {
  const displayedPlanets = collectDisplayedPlanetPositions();
  let anchor = null;
  let bestDistanceSq = CLUSTER_ACTIVATION_RADIUS * CLUSTER_ACTIVATION_RADIUS;
  displayedPlanets.forEach((entry) => {
    const dx = entry.position.x - x;
    const dy = entry.position.y - y;
    const distanceSq = (dx * dx) + (dy * dy);
    if (distanceSq <= bestDistanceSq) {
      bestDistanceSq = distanceSq;
      anchor = entry;
    }
  });
  if (!anchor) return null;
  const clusterEntries = displayedPlanets.filter((entry) => {
    const dx = entry.position.x - anchor.position.x;
    const dy = entry.position.y - anchor.position.y;
    return ((dx * dx) + (dy * dy)) <= (CLUSTER_PLANET_RADIUS * CLUSTER_PLANET_RADIUS);
  });
  if (clusterEntries.length < CLUSTER_MIN_PLANETS) return null;
  const center = averagePoints(clusterEntries.map((entry) => entry.position));
  const maxRadius = clusterEntries.reduce((radius, entry) => {
    const distance = Math.hypot(entry.position.x - center.x, entry.position.y - center.y);
    return Math.max(radius, distance);
  }, 0);
  return {
    id: `cluster__${anchor.planet.id}`,
    anchorPlanetId: anchor.planet.id,
    planetIds: clusterEntries.map((entry) => entry.planet.id),
    planetIdSet: new Set(clusterEntries.map((entry) => entry.planet.id)),
    count: clusterEntries.length,
    center,
    radius: Math.max(CLUSTER_PLANET_RADIUS, maxRadius + 28)
  };
}

function setClusterZoomState(nextState) {
  const prevActive = isClusterZoomActive();
  clusterZoomState = nextState || null;
  const nextActive = isClusterZoomActive();
  document.getElementById('app').classList.toggle('cluster-zoom', nextActive);
  if (prevActive !== nextActive) {
    markDirty({ positions: true, layers: true });
  }
}

function describeViewStatus() {
  const clusterText = isClusterZoomActive() && clusterZoomState
    ? ` • Cluster-Zoom ${clusterZoomState.count} Planeten`
    : '';
  return `Ansicht: Zoom ${zoom.toFixed(2)} • Pan ${Math.round(panX)}, ${Math.round(panY)}${clusterText}`;
}

function getClusterZoomProgress() {
  if (!isClusterZoomActive()) return 0;
  return clamp((zoom - MAX_ZOOM) / Math.max(0.001, CLUSTER_MAX_ZOOM - MAX_ZOOM), 0, 1);
}

function getClusterExpandedPoint(point) {
  if (!isClusterZoomActive() || !point) return point;
  const progress = getClusterZoomProgress();
  if (progress <= 0) return point;
  const center = clusterZoomState.center;
  const dx = point.x - center.x;
  const dy = point.y - center.y;
  const distance = Math.hypot(dx, dy);
  const influenceRadius = clusterZoomState.radius * 1.9;
  if (distance > influenceRadius) return point;
  const falloff = Math.pow(Math.max(0, 1 - (distance / influenceRadius)), 1.15);
  const expansion = 1 + (progress * 2.8 * falloff);
  return {
    x: clamp(center.x + dx * expansion, 0, WORLD_SIZE),
    y: clamp(center.y + dy * expansion, 0, WORLD_SIZE)
  };
}

function isPlanetVisibleInClusterZoom(planet) {
  if (!isClusterZoomActive()) return true;
  if (!planet) return false;
  if (selected?.type === 'planet' && selected.id === planet.id) return true;
  if (hoveredPlanetId === planet.id) return true;
  const basePosition = viewMode === 'schematic' ? getSchematicPlanetPosition(planet) : getImagePlanetPosition(planet);
  const center = clusterZoomState.center;
  const distance = Math.hypot(basePosition.x - center.x, basePosition.y - center.y);
  const progress = getClusterZoomProgress();
  const visibleRadius = clusterZoomState.radius * (1.45 - (progress * 0.65));
  return distance <= visibleRadius;
}

function zoomAtScreenPoint(nextZoom, screenX, screenY) {
  const oldZoom = zoom;
  if (Math.abs(nextZoom - oldZoom) < 1e-6) return false;
  zoom = nextZoom;
  panX = screenX - ((screenX - panX) * (zoom / oldZoom));
  panY = screenY - ((screenY - panY) * (zoom / oldZoom));
  markDirty({ transform: true, positions: true, layers: needsLayerRefreshForZoom(oldZoom, zoom) });
  return true;
}

function updateZoomFromInput(multiplier, clientX, clientY) {
  const rect = viewport.getBoundingClientRect();
  const screenX = clientX - rect.left;
  const screenY = clientY - rect.top;
  const worldX = (screenX - panX) / zoom;
  const worldY = (screenY - panY) / zoom;
  const zoomIn = multiplier > 1;
  let nextClusterState = clusterZoomState;

  if (!zoomIn && nextClusterState && zoom <= CLUSTER_RELEASE_ZOOM) {
    nextClusterState = null;
  }
  if (zoomIn && !nextClusterState && zoom >= CLUSTER_ZOOM_ENTRY_THRESHOLD) {
    nextClusterState = findClusterZoomCandidate(worldX, worldY);
  }

  const zoomLimit = nextClusterState ? CLUSTER_MAX_ZOOM : MAX_ZOOM;
  const nextZoom = clamp(zoom * multiplier, MIN_ZOOM, zoomLimit);

  if (!zoomIn && nextZoom <= MAX_ZOOM) {
    nextClusterState = null;
  }
  if (zoomIn && !nextClusterState && zoom >= MAX_ZOOM && nextZoom >= MAX_ZOOM) {
    setClusterZoomState(null);
    setStatus('Cluster-Zoom ist nur in dichten Planet-Clustern verfuegbar.');
    return false;
  }

  setClusterZoomState(nextClusterState);
  const changed = zoomAtScreenPoint(nextZoom, screenX, screenY);
  if (changed) setStatus(describeViewStatus());
  return changed;
}

function averageArcgisRing(ring, mode) {
  if (!Array.isArray(ring) || !ring.length) return null;
  return averagePoints(ring.map((point) => projectArcgisToWorld(point[0], point[1], mode)));
}

function simplifyPointList(points, targetCount = 64) {
  if (!Array.isArray(points) || points.length <= targetCount) return points || [];
  const step = Math.max(1, Math.ceil(points.length / targetCount));
  const simplified = [];
  for (let i = 0; i < points.length; i += step) simplified.push(points[i]);
  const last = points[points.length - 1];
  const tail = simplified[simplified.length - 1];
  if (!tail || tail[0] !== last[0] || tail[1] !== last[1]) simplified.push(last);
  return simplified;
}

function simplifyRings(rings, targetCount = 64) {
  if (!Array.isArray(rings)) return [];
  return rings.map((ring) => simplifyPointList(ring, targetCount));
}

function solve3x3(matrix, vector) {
  const m = matrix.map((row, rowIndex) => [...row, vector[rowIndex]]);
  for (let pivot = 0; pivot < 3; pivot += 1) {
    let maxRow = pivot;
    for (let row = pivot + 1; row < 3; row += 1) {
      if (Math.abs(m[row][pivot]) > Math.abs(m[maxRow][pivot])) maxRow = row;
    }
    if (Math.abs(m[maxRow][pivot]) < 1e-9) return null;
    if (maxRow !== pivot) [m[pivot], m[maxRow]] = [m[maxRow], m[pivot]];
    const divisor = m[pivot][pivot];
    for (let col = pivot; col < 4; col += 1) m[pivot][col] /= divisor;
    for (let row = 0; row < 3; row += 1) {
      if (row === pivot) continue;
      const factor = m[row][pivot];
      for (let col = pivot; col < 4; col += 1) m[row][col] -= factor * m[pivot][col];
    }
  }
  return [m[0][3], m[1][3], m[2][3]];
}

function fitAffineTransform(pairs) {
  if (pairs.length < 3) return null;
  let sumXX = 0; let sumXY = 0; let sumYY = 0; let sumX = 0; let sumY = 0; let count = 0;
  let sumTargetX = 0; let sumArcTargetX = 0; let sumArcYTargetX = 0;
  let sumTargetY = 0; let sumArcTargetY = 0; let sumArcYTargetY = 0;
  pairs.forEach(({ arcX, arcY, worldX, worldY }) => {
    sumXX += arcX * arcX;
    sumXY += arcX * arcY;
    sumYY += arcY * arcY;
    sumX += arcX;
    sumY += arcY;
    count += 1;
    sumTargetX += worldX;
    sumArcTargetX += arcX * worldX;
    sumArcYTargetX += arcY * worldX;
    sumTargetY += worldY;
    sumArcTargetY += arcX * worldY;
    sumArcYTargetY += arcY * worldY;
  });
  const normal = [
    [sumXX, sumXY, sumX],
    [sumXY, sumYY, sumY],
    [sumX, sumY, count]
  ];
  const xCoefficients = solve3x3(normal, [sumArcTargetX, sumArcYTargetX, sumTargetX]);
  const yCoefficients = solve3x3(normal, [sumArcTargetY, sumArcYTargetY, sumTargetY]);
  if (!xCoefficients || !yCoefficients) return null;
  return {
    x: xCoefficients,
    y: yCoefficients
  };
}

function polygonPathFromRings(rings, projector) {
  return rings
    .map((ring) => ring.map((point, index) => {
      const projected = projector(point[0], point[1]);
      return `${index ? 'L' : 'M'}${projected.x.toFixed(2)},${projected.y.toFixed(2)}`;
    }).join(' ') + ' Z')
    .join(' ');
}

function prepareArcgisData() {
  if (arcgisData) return arcgisData;
  if (!window.ARCGIS_COMPACT) return null;

  const planets = (window.ARCGIS_COMPACT.planets || []).map((planet) => ({
    key: normalizePlanetKey(planet.id || planet.name),
    name: planet.name || '',
    grid: planet.grid || '',
    sector: planet.sector || '',
    region: planet.region || '',
    cRegion: planet.cRegion || '',
    x: Number(planet.x),
    y: Number(planet.y)
  })).filter((planet) => Number.isFinite(planet.x) && Number.isFinite(planet.y));

  const planetMap = new Map();
  planets.forEach((planet) => {
    if (!planetMap.has(planet.key)) planetMap.set(planet.key, planet);
  });

  const grid = (window.ARCGIS_COMPACT.grid || [])
    .filter((cell) => String(cell.name || '').trim())
    .map((cell) => ({ name: cell.name, rings: cell.rings || [] }));

  const boundsSource = [];
  grid.forEach((cell) => {
    cell.rings.forEach((ring) => ring.forEach((point) => boundsSource.push(point)));
  });
  if (!boundsSource.length) {
    planets.forEach((planet) => boundsSource.push([planet.x, planet.y]));
  }
  const minArcX = Math.min(...boundsSource.map((point) => point[0]));
  const maxArcX = Math.max(...boundsSource.map((point) => point[0]));
  const minArcY = Math.min(...boundsSource.map((point) => point[1]));
  const maxArcY = Math.max(...boundsSource.map((point) => point[1]));
  const imagePairs = POSITION_CALIBRATION_ANCHORS
    .map((anchor) => {
      const match = planetMap.get(anchor.id);
      if (!match) return null;
      return { arcX: match.x, arcY: match.y, worldX: anchor.next.x, worldY: anchor.next.y };
    })
    .filter(Boolean);
  const fallbackImagePairs = DEFAULT_DATA.planets
    .map((planet) => {
      const match = planetMap.get(normalizePlanetKey(planet.name));
      if (!match) return null;
      return { arcX: match.x, arcY: match.y, worldX: planet.x, worldY: planet.y };
    })
    .filter(Boolean);
  const imageTransform = fitAffineTransform(imagePairs);

  arcgisData = {
    planets,
    planetMap,
    hyperlanes: (window.ARCGIS_COMPACT.hyperlanes || []).map((lane) => ({
      name: lane.name || 'Unnamed Route',
      zoom: Number(lane.zoom ?? 0),
      paths: (lane.paths || []).map((path) => simplifyPointList(path, 28))
    })),
    regions: (window.ARCGIS_COMPACT.regions || []).map((region) => ({
      name: region.name || 'Unknown Region',
      rings: simplifyRings(region.rings || [], 42)
    })),
    sectors: (window.ARCGIS_COMPACT.sectors || []).map((sector) => ({
      name: sector.name || 'Unknown Sector',
      rings: simplifyRings(sector.rings || [], 48)
    })).filter((sector) => String(sector.name || '').trim()),
    grid: (window.ARCGIS_COMPACT.grid || []).map((cell) => ({ ...cell, rings: simplifyRings(cell.rings || [], 8) })),
    bounds: { minArcX, maxArcX, minArcY, maxArcY },
    imageTransform: imageTransform || fitAffineTransform(fallbackImagePairs)
  };
  if (TACTICAL_DEBUG && !tacticalDebugArcgisLogged) {
    tacticalDebugArcgisLogged = true;
    logTacticalDebug('prepareArcgisData', {
      counts: {
        planets: arcgisData.planets.length,
        hyperlanes: arcgisData.hyperlanes.length,
        regions: arcgisData.regions.length,
        sectors: arcgisData.sectors.length,
        grid: arcgisData.grid.length
      },
      bounds: arcgisData.bounds,
      imageTransform: arcgisData.imageTransform,
      samplePlanet: arcgisData.planets[0] || null
    });
  }
  return arcgisData;
}

function getArcgisCounts() {
  const data = prepareArcgisData();
  if (!data) return null;
  return {
    planets: data.planets.length,
    hyperlanes: data.hyperlanes.length,
    regions: data.regions.length,
    sectors: data.sectors.length,
    grid: data.grid.length
  };
}

function projectArcgisToWorld(x, y, mode = 'schematic') {
  const data = prepareArcgisData();
  if (!data || !Number.isFinite(x) || !Number.isFinite(y)) return { x: WORLD_SIZE / 2, y: WORLD_SIZE / 2 };
  if (mode === 'image' && data.imageTransform) {
    const shiftedX = ((data.imageTransform.x[0] * x) + (data.imageTransform.x[1] * y) + data.imageTransform.x[2]) + IMAGE_MODE_ARCGIS_OFFSET.x;
    const shiftedY = ((data.imageTransform.y[0] * x) + (data.imageTransform.y[1] * y) + data.imageTransform.y[2]) + IMAGE_MODE_ARCGIS_OFFSET.y;
    const dx = shiftedX - IMAGE_MODE_ARCGIS_WARP_PIVOT.x;
    const dy = shiftedY - IMAGE_MODE_ARCGIS_WARP_PIVOT.y;
    const warpedX = IMAGE_MODE_ARCGIS_WARP_PIVOT.x + (dx * IMAGE_MODE_ARCGIS_WARP.xx) + (dy * IMAGE_MODE_ARCGIS_WARP.xy);
    const warpedY = IMAGE_MODE_ARCGIS_WARP_PIVOT.y + (dx * IMAGE_MODE_ARCGIS_WARP.yx) + (dy * IMAGE_MODE_ARCGIS_WARP.yy);
    const worldX = (warpedX * IMAGE_MODE_ARCGIS_FINE_AFFINE.xx) + (warpedY * IMAGE_MODE_ARCGIS_FINE_AFFINE.xy) + IMAGE_MODE_ARCGIS_FINE_AFFINE.tx;
    const worldY = (warpedX * IMAGE_MODE_ARCGIS_FINE_AFFINE.yx) + (warpedY * IMAGE_MODE_ARCGIS_FINE_AFFINE.yy) + IMAGE_MODE_ARCGIS_FINE_AFFINE.ty;
    return { x: clamp(worldX, 0, WORLD_SIZE), y: clamp(worldY, 0, WORLD_SIZE) };
  }
  const margin = mode === 'schematic' ? 72 : 0;
  const usable = WORLD_SIZE - margin * 2;
  const xNorm = (x - data.bounds.minArcX) / Math.max(1, data.bounds.maxArcX - data.bounds.minArcX);
  const yNorm = (data.bounds.maxArcY - y) / Math.max(1, data.bounds.maxArcY - data.bounds.minArcY);
  return {
    x: clamp(margin + (xNorm * usable), 0, WORLD_SIZE),
    y: clamp(margin + (yNorm * usable), 0, WORLD_SIZE)
  };
}

function getArcgisPlanetRecord(planet) {
  const data = prepareArcgisData();
  if (!data) return null;
  return data.planetMap.get(normalizePlanetKey(planet.name)) || null;
}

function createPlanetFromArcgisRecord(record, overrides = {}) {
  if (!record) return null;
  const projected = projectArcgisToWorld(record.x, record.y, 'image');
  return {
    id: overrides.id || normalizePlanetKey(record.id || record.name),
    name: overrides.name || record.name,
    grid: overrides.grid || compactGridName(record.grid),
    sector: overrides.sector !== undefined ? overrides.sector : (String(record.sector || '').trim()),
    region: overrides.region || record.cRegion || record.region || '',
    x: projected.x,
    y: projected.y,
    owner: overrides.owner || 'NEUTRAL',
    wiki: overrides.wiki || '',
    description: overrides.description || ''
  };
}

function ensureImportantCampaignPlanets() {
  const arcgisDataSet = prepareArcgisData();
  const coruscantRecord = arcgisDataSet?.planetMap?.get('coruscant');
  if (!coruscantRecord) return;
  const existingCoruscant = state.planets.find((planet) => {
    const key = normalizePlanetKey(planet.id || planet.name);
    return key === 'coruscant' || key === 'imperial_center';
  });
  if (existingCoruscant) {
    const projected = projectArcgisToWorld(coruscantRecord.x, coruscantRecord.y, 'image');
    existingCoruscant.id = 'coruscant';
    existingCoruscant.name = 'Coruscant';
    existingCoruscant.owner = existingCoruscant.owner || 'GAR';
    existingCoruscant.grid = existingCoruscant.grid || compactGridName(coruscantRecord.grid);
    existingCoruscant.sector = existingCoruscant.sector || String(coruscantRecord.sector || '').trim();
    existingCoruscant.region = existingCoruscant.region || coruscantRecord.cRegion || coruscantRecord.region || '';
    existingCoruscant.wiki = existingCoruscant.wiki || 'https://starwars.fandom.com/wiki/Coruscant';
    setPlanetWorldPosition(existingCoruscant, projected.x, projected.y);
    return;
  }
  state.planets.push(createPlanetFromArcgisRecord(coruscantRecord, {
    id: 'coruscant',
    name: 'Coruscant',
    owner: 'GAR',
    wiki: 'https://starwars.fandom.com/wiki/Coruscant'
  }));
}

function buildGridModel() {
  const colBuckets = new Map();
  const rowBuckets = new Map();
  state.planets.forEach((planet) => {
    const grid = parseGrid(planet.grid);
    if (!grid) return;
    if (!colBuckets.has(grid.col)) colBuckets.set(grid.col, []);
    if (!rowBuckets.has(grid.row)) rowBuckets.set(grid.row, []);
    colBuckets.get(grid.col).push(planet.x);
    rowBuckets.get(grid.row).push(planet.y);
  });
  const colCenters = new Map();
  const rowCenters = new Map();
  colBuckets.forEach((values, key) => colCenters.set(key, median(values)));
  rowBuckets.forEach((values, key) => rowCenters.set(key, median(values)));
  gridModel = { colCenters, rowCenters };
}

function getGridCellCenter(grid) {
  if (!gridModel) buildGridModel();
  const parsed = parseGrid(grid);
  if (!parsed) return null;
  const x = gridModel.colCenters.get(parsed.col);
  const y = gridModel.rowCenters.get(parsed.row);
  if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
  return { x, y };
}

function getPlanetFallbackCenter(planet) {
  return getGridCellCenter(planet.grid) || { x: planet.x, y: planet.y };
}

function getPlanetAutoFitAnchor(planet) {
  if (Number.isFinite(planet.x) && Number.isFinite(planet.y)) {
    return { x: planet.x, y: planet.y };
  }
  return getPlanetFallbackCenter(planet);
}

function colorAt(x, y) {
  if (!mapAnalysis) return null;
  const ix = clamp(Math.round(x), 0, WORLD_SIZE - 1);
  const iy = clamp(Math.round(y), 0, WORLD_SIZE - 1);
  const idx = (iy * WORLD_SIZE + ix) * 4;
  const data = mapAnalysis.data;
  return { r: data[idx], g: data[idx + 1], b: data[idx + 2], a: data[idx + 3] };
}

function markerScoreAt(x, y) {
  const c = colorAt(x, y);
  if (!c) return 0;
  const cyanBias = (c.g + c.b) - (c.r * 0.85);
  const brightness = (c.r + c.g + c.b) / 3;
  return cyanBias > 180 && brightness > 110 ? cyanBias + brightness : 0;
}

function hyperlaneScoreAt(x, y) {
  const c = colorAt(x, y);
  if (!c) return 0;
  const magenta = (c.r + c.b) - (c.g * 1.15);
  const brightness = (c.r + c.g + c.b) / 3;
  return magenta > 130 && brightness > 70 ? magenta + brightness * 0.3 : 0;
}

function initMapAnalysis() {
  if (mapAnalysis || mapAnalysisUnavailable || !mapEl.complete || !mapEl.naturalWidth) return;
  const canvas = document.createElement('canvas');
  canvas.width = WORLD_SIZE;
  canvas.height = WORLD_SIZE;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  try {
    ctx.drawImage(mapEl, 0, 0, WORLD_SIZE, WORLD_SIZE);
    mapAnalysis = {
      canvas,
      ctx,
      data: ctx.getImageData(0, 0, WORLD_SIZE, WORLD_SIZE).data
    };
    if (TACTICAL_DEBUG) {
      logTacticalDebug('initMapAnalysis ready', {
        naturalWidth: mapEl.naturalWidth,
        naturalHeight: mapEl.naturalHeight,
        src: mapEl.currentSrc || mapEl.src
      });
    }
  } catch (error) {
    mapAnalysisUnavailable = true;
    mapAnalysis = null;
    console.warn('[TACTICAL] map analysis unavailable; continuing without pixel sampling', {
      message: error?.message,
      name: error?.name,
      src: mapEl.currentSrc || mapEl.src,
      protocol: window.location.protocol
    });
    setStatus('Karten-Pixelanalyse vom Browser blockiert. Tactical-Overlay bleibt aktiv, Auto-Fit/Hyperlane-Sampling laufen im Fallback.');
  }
}

function findMarkerCandidatesNear(x, y, radius = 64, limit = 6) {
  if (!mapAnalysis) return [];
  const candidates = [];
  const step = radius > 30 ? 2 : 1;
  for (let py = y - radius; py <= y + radius; py += step) {
    for (let px = x - radius; px <= x + radius; px += step) {
      const dx = px - x;
      const dy = py - y;
      const distSq = dx * dx + dy * dy;
      if (distSq > radius * radius) continue;
      const score = markerScoreAt(px, py) - Math.sqrt(distSq) * 1.15;
      if (score <= 0) continue;
      candidates.push({ x: px, y: py, score });
    }
  }
  candidates.sort((a, b) => b.score - a.score);
  const deduped = [];
  candidates.forEach((candidate) => {
    if (deduped.some((entry) => ((entry.x - candidate.x) ** 2 + (entry.y - candidate.y) ** 2) < 36)) return;
    deduped.push(candidate);
  });
  return deduped.slice(0, limit);
}

function distributeAroundPoint(center, index, total, radius = 18) {
  if (total <= 1) return center;
  const angle = (-Math.PI / 2) + ((Math.PI * 2) * index / total);
  const ringRadius = radius + (Math.floor(index / 6) * 10);
  return {
    x: clamp(center.x + Math.cos(angle) * ringRadius, 0, WORLD_SIZE),
    y: clamp(center.y + Math.sin(angle) * ringRadius, 0, WORLD_SIZE)
  };
}

function getSchematicCellCenter(grid) {
  const parsed = parseGrid(grid);
  const columnCount = 24;
  const rowCount = 22;
  const marginX = 120;
  const marginY = 120;
  const usableWidth = WORLD_SIZE - marginX * 2;
  const usableHeight = WORLD_SIZE - marginY * 2;
  const cellWidth = usableWidth / columnCount;
  const cellHeight = usableHeight / rowCount;
  const colIndex = parsed ? Math.max(0, Math.min(columnCount - 1, parsed.col.charCodeAt(0) - 65)) : Math.floor(columnCount / 2);
  const rowIndex = parsed ? Math.max(0, Math.min(rowCount - 1, parsed.row - 1)) : Math.floor(rowCount / 2);
  return {
    x: marginX + (colIndex + 0.5) * cellWidth,
    y: marginY + (rowIndex + 0.5) * cellHeight
  };
}

function getSchematicPlanetPosition(planet) {
  const arcgisPlanet = getArcgisPlanetRecord(planet);
  if (arcgisPlanet) return projectArcgisToWorld(arcgisPlanet.x, arcgisPlanet.y, 'image');
  return { x: planet.x, y: planet.y };
}

function getImagePlanetPosition(planet) {
  const arcgisPlanet = getArcgisPlanetRecord(planet);
  if (arcgisPlanet) return projectArcgisToWorld(arcgisPlanet.x, arcgisPlanet.y, 'image');
  return { x: planet.x, y: planet.y };
}

function applyArcgisPlanetImport(force = false) {
  const data = prepareArcgisData();
  if (!data) return false;
  state.meta = state.meta || {};
  if (!force && state.meta.arcgisImportVersion === ARCGIS_IMPORT_VERSION) return false;
  let updatedCount = 0;
  state.planets.forEach((planet) => {
    const match = getArcgisPlanetRecord(planet);
    if (!match) return;
    const projected = projectArcgisToWorld(match.x, match.y, 'image');
    setPlanetWorldPosition(planet, projected.x, projected.y);
    if (!planet.region && match.region) planet.region = match.region;
    if (!planet.sector && match.sector) planet.sector = match.sector;
    updatedCount += 1;
  });
  state.meta.arcgisImportVersion = ARCGIS_IMPORT_VERSION;
  rebuildIndexes();
  saveLocal();
  render({ positions: true, frontline: true, layers: true });
  return updatedCount > 0;
}

function getPlanetDisplayPosition(planet) {
  const basePosition = viewMode === 'schematic' ? getSchematicPlanetPosition(planet) : getImagePlanetPosition(planet);
  return getClusterExpandedPoint(basePosition);
}

function getCalibrationDisplacement(x, y) {
  let totalWeight = 0;
  let dx = 0;
  let dy = 0;
  POSITION_CALIBRATION_ANCHORS.forEach((anchor) => {
    const anchorDx = anchor.next.x - anchor.old.x;
    const anchorDy = anchor.next.y - anchor.old.y;
    const distance = Math.hypot(x - anchor.old.x, y - anchor.old.y);
    const weight = 1 / Math.pow(Math.max(120, distance), 1.35);
    totalWeight += weight;
    dx += anchorDx * weight;
    dy += anchorDy * weight;
  });
  if (!totalWeight) return { dx: 0, dy: 0 };
  return { dx: dx / totalWeight, dy: dy / totalWeight };
}

function getCalibratedPositionForPlanet(planet) {
  const exactAnchor = POSITION_CALIBRATION_ANCHORS.find((anchor) => anchor.id === planet.id);
  if (exactAnchor) {
    return { x: exactAnchor.next.x, y: exactAnchor.next.y };
  }
  const displacement = getCalibrationDisplacement(planet.x, planet.y);
  return {
    x: clamp(planet.x + displacement.dx, 0, WORLD_SIZE),
    y: clamp(planet.y + displacement.dy, 0, WORLD_SIZE)
  };
}

function applyPositionCalibration(force = false) {
  state.meta = state.meta || {};
  if (!force && state.meta.positionCalibrationVersion === POSITION_CALIBRATION_VERSION) return false;
  state.planets.forEach((planet) => {
    const calibrated = getCalibratedPositionForPlanet(planet);
    setPlanetWorldPosition(planet, calibrated.x, calibrated.y);
  });
  state.meta.positionCalibrationVersion = POSITION_CALIBRATION_VERSION;
  rebuildIndexes();
  saveLocal();
  render({ positions: true, frontline: true, layers: true });
  return true;
}

function autoFitPlanets(force = false) {
  initMapAnalysis();
  if (!mapAnalysis) return false;
  state.meta = state.meta || {};
  if (!force && state.meta.autoPlacementVersion === AUTO_PLACEMENT_VERSION) return false;
  const groups = new Map();
  state.planets.forEach((planet) => {
    const key = planet.grid || planet.id;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(planet);
  });
  let movedCount = 0;
  groups.forEach((planets) => {
    const anchor = planets.reduce((acc, planet) => {
      const pos = getPlanetAutoFitAnchor(planet);
      acc.x += pos.x;
      acc.y += pos.y;
      return acc;
    }, { x: 0, y: 0 });
    anchor.x /= planets.length;
    anchor.y /= planets.length;
    const candidates = findMarkerCandidatesNear(anchor.x, anchor.y, 44, Math.max(3, planets.length));
    const used = new Set();
    planets
      .slice()
      .sort((a, b) => ((a.x - anchor.x) ** 2 + (a.y - anchor.y) ** 2) - ((b.x - anchor.x) ** 2 + (b.y - anchor.y) ** 2))
      .forEach((planet, index) => {
        const current = getPlanetAutoFitAnchor(planet);
        let assigned = null;
        let bestScore = -Infinity;
        candidates.forEach((candidate, candidateIndex) => {
          if (used.has(candidateIndex)) return;
          const closeness = Math.hypot(current.x - candidate.x, current.y - candidate.y);
          const score = candidate.score - closeness * 1.15;
          if (score > bestScore) {
            bestScore = score;
            assigned = { candidate, candidateIndex };
          }
        });
        if (assigned && bestScore > 150 && Math.hypot(current.x - assigned.candidate.x, current.y - assigned.candidate.y) <= 40) {
          used.add(assigned.candidateIndex);
          setPlanetWorldPosition(planet, assigned.candidate.x, assigned.candidate.y);
          movedCount += 1;
        } else {
          const fallback = distributeAroundPoint(current, index, planets.length, 10);
          setPlanetWorldPosition(planet, fallback.x, fallback.y);
        }
      });
  });
  state.meta.autoPlacementVersion = AUTO_PLACEMENT_VERSION;
  rebuildIndexes();
  saveLocal();
  render({ positions: true, frontline: true, layers: true });
  return movedCount > 0;
}

function hyperlaneSegmentScore(a, b) {
  if (!mapAnalysis) return 1;
  const distance = Math.hypot(b.x - a.x, b.y - a.y);
  const samples = Math.max(12, Math.ceil(distance / 8));
  let total = 0;
  for (let i = 0; i <= samples; i += 1) {
    const t = i / samples;
    total += hyperlaneScoreAt(a.x + (b.x - a.x) * t, a.y + (b.y - a.y) * t);
  }
  return total / (samples + 1);
}

function rebuildFleetRenderPositions() {
  fleetRenderPositions.clear();
  const byPlanet = new Map();
  state.fleets.forEach((fleet) => {
    const planetId = fleet.locationPlanetId || fleet.planetId;
    if (!planetId) return;
    if (!byPlanet.has(planetId)) byPlanet.set(planetId, []);
    byPlanet.get(planetId).push(fleet);
  });
  byPlanet.forEach((fleets, planetId) => {
    const planet = planetIndex.get(planetId);
    if (!planet) return;
    const basePosition = getImagePlanetPosition(planet);
    fleets
      .slice()
      .sort((a, b) => `${a.faction}:${a.id}`.localeCompare(`${b.faction}:${b.id}`))
      .forEach((fleet, index) => {
        const total = fleets.length;
        const factionBias = fleet.faction === 'GAR' ? -0.55 : 0.55;
        const angle = total === 1
          ? (fleet.faction === 'GAR' ? -Math.PI * 0.72 : Math.PI * 0.28)
          : ((Math.PI * 2) * index / total) + factionBias;
        const radius = total === 1 ? 26 : 30 + Math.floor(index / 6) * 8;
        fleetRenderPositions.set(fleet.id, {
          x: clamp(basePosition.x + Math.cos(angle) * radius, 0, WORLD_SIZE),
          y: clamp(basePosition.y + Math.sin(angle) * radius, 0, WORLD_SIZE)
        });
      });
  });
}

function getFleetDisplayPosition(fleet) {
  const travel = fleetTravelState.get(fleet.id);
  if (travel?.currentPosition) return travel.currentPosition;
  const locationPlanetId = fleet.locationPlanetId || fleet.planetId;
  if (viewMode !== 'schematic') {
    const rawPosition = fleetRenderPositions.get(fleet.id) || { x: fleet.x, y: fleet.y };
    if (!isClusterZoomActive()) return rawPosition;
    const planet = planetIndex.get(locationPlanetId);
    if (!planet) return rawPosition;
    const rawPlanetPosition = getImagePlanetPosition(planet);
    const displayPlanetPosition = getPlanetDisplayPosition(planet);
    return {
      x: clamp(displayPlanetPosition.x + (rawPosition.x - rawPlanetPosition.x), 0, WORLD_SIZE),
      y: clamp(displayPlanetPosition.y + (rawPosition.y - rawPlanetPosition.y), 0, WORLD_SIZE)
    };
  }
  const planet = planetIndex.get(locationPlanetId);
  if (!planet) return { x: fleet.x, y: fleet.y };
  const base = getSchematicPlanetPosition(planet);
  const hash = stableHash(`${fleet.id}:${fleet.faction}`);
  const angle = ((hash % 360) * Math.PI) / 180;
  const radius = 20;
  return {
    x: clamp(base.x + Math.cos(angle) * radius, 0, WORLD_SIZE),
    y: clamp(base.y + Math.sin(angle) * radius, 0, WORLD_SIZE)
  };
}

function sanitizeCampaignMeta(meta) {
  const source = meta && typeof meta === 'object' ? meta : {};
  const blockedKeys = new Set([
    'arcgisCompact',
    'arcgisRaw',
    'hyperlanes',
    'grid',
    'regions',
    'sectors',
    'mapAnalysis',
    'routeCache',
    'tacticalRouteCache',
    'searchState',
    'layerState',
    'viewState',
    'zoom',
    'panX',
    'panY',
    'viewMode',
    'ui',
    'animationState',
    'renderCache',
    'indexCache',
    'domCache'
  ]);
  return Object.fromEntries(
    Object.entries(source).filter(([key]) => !blockedKeys.has(key))
  );
}

function makeServerCampaignPayload(nextState) {
  const payload = {
    planets: Array.isArray(nextState?.planets) ? nextState.planets : [],
    fleets: Array.isArray(nextState?.fleets) ? nextState.fleets : [],
    ships: Array.isArray(nextState?.ships) ? nextState.ships : [],
    buildJobs: Array.isArray(nextState?.buildJobs) ? nextState.buildJobs : [],
    fleetMotions: Array.isArray(nextState?.fleetMotions) ? nextState.fleetMotions : [],
    resources: nextState?.resources && typeof nextState.resources === 'object' ? nextState.resources : {},
    planetResources: nextState?.planetResources && typeof nextState.planetResources === 'object' ? nextState.planetResources : {},
    importWarnings: Array.isArray(nextState?.importWarnings) ? nextState.importWarnings : [],
    meta: sanitizeCampaignMeta(nextState?.meta)
  };
  return JSON.parse(JSON.stringify(payload));
}

function applyServerCampaign(campaign, revision = serverRevision) {
  if (!campaign || typeof campaign !== 'object') return;
  applyingRemoteState = true;
  serverSync.isApplyingRemoteState = true;
  try {
    state = JSON.parse(JSON.stringify({
      ...DEFAULT_DATA,
      ...campaign,
      authUsers: Array.isArray(campaign.authUsers) ? campaign.authUsers : []
    }));
    normalizeCampaignState();
    rebuildIndexes();
    syncFleetTravelStateFromCampaign();
    renderBaseThenDeferHeavy();
    serverRevision = Number(revision || 0);
    serverSync.revision = serverRevision;
  } finally {
    applyingRemoteState = false;
    serverSync.isApplyingRemoteState = false;
  }
}

function clearServerReconnectTimer() {
  if (!serverSync.reconnectTimer) return;
  window.clearTimeout(serverSync.reconnectTimer);
  serverSync.reconnectTimer = null;
}

function clearServerRefreshTimer() {
  if (!serverSync.refreshTimer) return;
  window.clearTimeout(serverSync.refreshTimer);
  serverSync.refreshTimer = null;
}

function updateServerSession(me) {
  if (!me) return;
  serverSync.session = me;
  currentAuthenticatedUsername = me.username || '';
  roleSelect.value = me.role || 'Viewer';
  refreshRoleChrome();
}

function destroyServerSocketConnection() {
  if (!serverSync.socket) return;
  serverSync.socket.removeAllListeners();
  serverSync.socket.disconnect();
  serverSync.socket = null;
}

function disableLiveSync(reason) {
  destroyServerSocketConnection();
  clearServerReconnectTimer();
  clearServerRefreshTimer();
  serverSync.offlineMode = true;
  setStatus(reason || 'Server nicht erreichbar. Lokaler Offline-Modus aktiv.');
}

function scheduleSocketReconnect(reason) {
  if (!serverSync.enabled || serverSync.offlineMode || serverSync.reconnectTimer) return;
  const delay = Math.min(15000, 1000 * (2 ** Math.min(serverSync.reconnectAttempt, 4)));
  serverSync.reconnectAttempt += 1;
  setStatus(`${reason || 'Live-Sync getrennt.'} Neuer Verbindungsversuch in ${(delay / 1000).toFixed(delay >= 10000 ? 0 : 1)}s.`);
  serverSync.reconnectTimer = window.setTimeout(() => {
    serverSync.reconnectTimer = null;
    connectServerSocket();
  }, delay);
}

async function refreshCampaignFromServer() {
  if (!serverSync.enabled || serverSync.refreshInFlight) return;
  if (serverSync.syncInFlight || serverSync.syncQueued || isRendering) {
    scheduleCampaignRefresh(1200);
    return;
  }
  serverSync.refreshInFlight = true;
  try {
    const response = await fetch('/api/bootstrap', { credentials: 'include' });
    if (!response.ok) throw new Error(`bootstrap failed (${response.status})`);
    const payload = await response.json();
    serverSync.offlineMode = false;
    updateServerSession(payload.me || { id: null, username: '', role: 'Viewer' });
    const nextRevision = Number(payload.revision || 0);
    if (nextRevision > serverRevision) {
      applyServerCampaign(payload.campaign || DEFAULT_DATA, nextRevision);
    }
  } catch (error) {
    console.warn('Server refresh failed', error);
    scheduleSocketReconnect('Live-Sync Aktualisierung fehlgeschlagen.');
  } finally {
    serverSync.refreshInFlight = false;
  }
}

function scheduleCampaignRefresh(delay = 250) {
  if (!serverSync.enabled || serverSync.offlineMode) return;
  clearServerRefreshTimer();
  serverSync.refreshTimer = window.setTimeout(() => {
    serverSync.refreshTimer = null;
    refreshCampaignFromServer();
  }, delay);
}

function emitLiveSocketEvent(eventName, payload) {
  if (!serverSync.socket?.connected) return;
  if (!serverSync.session?.role || serverSync.session.role === 'Viewer') return;
  serverSync.socket.emit(eventName, payload);
}

async function bootstrapFromServer() {
  if (!serverSync.enabled) return;
  try {
    const response = await fetch('/api/bootstrap', { credentials: 'include' });
    if (!response.ok) throw new Error(`bootstrap failed (${response.status})`);
    const payload = await response.json();
    serverSync.offlineMode = false;
    updateServerSession(payload.me || { id: null, username: '', role: 'Viewer' });
    const nextRevision = Number(payload.revision || 0);
    console.log('bootstrap received');
    if (!(nextRevision > 0 && nextRevision === serverRevision && state?.planets?.length)) {
      applyServerCampaign(payload.campaign || DEFAULT_DATA, nextRevision);
    }
    serverSyncReady = true;
    serverRevision = nextRevision;
    serverSync.revision = serverRevision;
    refreshRoleChrome();
    window.setTimeout(() => connectServerSocket(), 250);
  } catch (error) {
    console.warn('Server bootstrap unavailable, falling back to local state', error);
    applyDefaultAnonymousRole();
    refreshRoleChrome();
    disableLiveSync('Server-Bootstrap fehlgeschlagen. Lokaler Offline-Modus aktiv.');
  }
}

function connectServerSocket() {
  if (!serverSync.enabled || serverSync.offlineMode || typeof io === 'undefined' || serverSync.socket) return;
  serverSync.socket = io({
    withCredentials: true,
    transports: ['websocket'],
    reconnection: false,
    timeout: 2500
  });
  serverSync.socket.on('connect', () => {
    serverSync.offlineMode = false;
    serverSync.reconnectAttempt = 0;
    clearServerReconnectTimer();
    setStatus('Live-Sync mit Server verbunden.');
  });
  serverSync.socket.on('socket:ready', (payload) => {
    updateServerSession(payload?.me || { id: null, username: '', role: 'Viewer' });
    const nextRevision = Number(payload?.revision || 0);
    if (nextRevision > serverRevision) scheduleCampaignRefresh(120);
  });
  serverSync.socket.on('disconnect', (reason) => {
    destroyServerSocketConnection();
    scheduleSocketReconnect(`Live-Sync getrennt (${reason || 'unbekannt'}).`);
  });
  serverSync.socket.on('connect_error', (error) => {
    console.warn('socket connect error', error);
    destroyServerSocketConnection();
    scheduleSocketReconnect('Live-Sync Server nicht erreichbar.');
  });
  serverSync.socket.on('campaign:state-changed', (payload) => {
    const nextRevision = Number(payload?.revision || 0);
    if (!(nextRevision > serverRevision)) return;
    scheduleCampaignRefresh(160);
  });
  serverSync.socket.on('campaign:bulk-sync', (payload) => {
    if (!payload?.campaign) return;
    const nextRevision = Number(payload.revision || 0);
    if (nextRevision > 0 && nextRevision <= serverRevision) return;
    applyServerCampaign(payload.campaign, nextRevision);
    if (payload.me) updateServerSession(payload.me);
  });
  serverSync.socket.on('fx:fleet-jump-start', (payload) => {
    if (!payload?.motion?.fleetId) return;
    upsertFleetMotionRecord(payload.motion);
    beginFleetTravelFromMotion(payload.motion, { playStartAudio: true, persistMotion: false });
  });
  serverSync.socket.on('fx:fleet-delete', (payload) => {
    const fleet = fleetIndex.get(payload?.fleetId);
    if (!fleet) return;
    const display = getFleetDisplayPosition(fleet);
    playAudioCue(fleetDeleteAudio);
    spawnFleetExplosion(display.x, display.y);
  });
}

function queueCampaignSync() {
  if (!serverSync.enabled || applyingRemoteState || serverSync.isApplyingRemoteState || isRendering || !serverSyncReady) return;
  if (!serverSync.session?.role || serverSync.session.role === 'Viewer') return;
  if (saveSyncTimer) window.clearTimeout(saveSyncTimer);
  if (serverSync.syncInFlight) {
    serverSync.syncQueued = true;
    return;
  }
  serverSync.syncQueued = true;
  saveSyncTimer = window.setTimeout(() => {
    saveSyncTimer = null;
    pushCampaignStateToServer();
  }, 1000);
}

async function pushCampaignStateToServer() {
  if (!serverSync.enabled || serverSync.syncInFlight) return;
  if (applyingRemoteState || serverSync.isApplyingRemoteState) {
    serverSync.syncQueued = false;
    return;
  }
  if (isRendering || !serverSyncReady) {
    serverSync.syncQueued = true;
    if (!saveSyncTimer) {
      saveSyncTimer = window.setTimeout(() => {
        saveSyncTimer = null;
        pushCampaignStateToServer();
      }, 1000);
    }
    return;
  }
  if (!serverSync.session?.role || serverSync.session.role === 'Viewer') return;
  const campaignPayload = makeServerCampaignPayload(state);
  const kb = Math.round(JSON.stringify(campaignPayload).length / 1024);
  console.log('server sync payload KB', kb);
  console.log('server sync PUT');
  serverSync.syncQueued = false;
  serverSync.syncInFlight = true;
  try {
    const response = await fetch('/api/campaign/state', {
      method: 'PUT',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        expectedRevision: serverRevision,
        campaign: campaignPayload
      })
    });
    const responsePayload = await response.json();
    if (!response.ok) {
      if (response.status === 409) {
        await bootstrapFromServer();
      }
      throw new Error(responsePayload.error || `sync failed (${response.status})`);
    }
    serverRevision = Number(responsePayload.revision || serverRevision);
    serverSync.revision = serverRevision;
  } catch (error) {
    console.warn('Campaign sync failed', error);
    setStatus(`Server-Sync fehlgeschlagen: ${error.message}`);
  } finally {
    serverSync.syncInFlight = false;
    if (serverSync.syncQueued) queueCampaignSync();
  }
}

function getFactionResourcePool(faction = 'GAR') {
  state.resources = state.resources || {};
  state.resources[faction] = { ...createEmptyFactionResources(), ...(state.resources[faction] || {}) };
  return state.resources[faction];
}

function getPlanetResourceSlots(planetId) {
  const slots = state.planetResources?.[planetId];
  return Array.isArray(slots) ? slots.filter((slot) => RESOURCE_KEYS.includes(slot)).slice(0, 3) : [];
}

function setPlanetResourceSlots(planetId, slots) {
  state.planetResources = state.planetResources || {};
  state.planetResources[planetId] = (slots || []).filter((slot) => RESOURCE_KEYS.includes(slot)).slice(0, 3);
}

function isResourceAssignmentEditable(planet) {
  if (!planet) return false;
  const role = currentRole();
  if (role === 'Admin') return true;
  if (role === 'Eventleiter / KUS') return planet.owner !== 'GAR';
  return false;
}

function getActiveShipyardFaction() {
  const role = currentRole();
  if (role === 'Eventleiter / KUS') return 'KUS';
  if (role === 'Republic Navy / GAR') return 'GAR';
  if (role === 'Admin') return activeShipyardFactionOverride === 'KUS' ? 'KUS' : 'GAR';
  return 'GAR';
}

}

function summarizeResourceSlots(slots) {
  const counts = {};
  slots.forEach((slot) => {
    counts[slot] = (counts[slot] || 0) + 1;
  });
  return counts;
}

function addFactionResources(faction, delta) {
  const pool = getFactionResourcePool(faction);
  RESOURCE_KEYS.forEach((key) => {
    pool[key] = Math.max(0, Math.round((pool[key] || 0) + (delta?.[key] || 0)));
  });
}

function getCaptureRewardForPlanet(planetId) {
  const reward = createEmptyFactionResources();
  getPlanetResourceSlots(planetId).forEach((slot) => {
    reward[slot] += CAPTURE_REWARD_PER_SLOT;
  });
  return reward;
}

function getFactionProductionRate(faction = 'GAR') {
  const totals = createEmptyFactionResources();
  state.planets.forEach((planet) => {
    if (planet.owner !== faction) return;
    getPlanetResourceSlots(planet.id).forEach((slot) => {
      totals[slot] += 1;
    });
  });
  return totals;
}

function applyProductionTicks(now = Date.now()) {
  const lastTick = Number(state.lastResourceTickAt) || now;
  const elapsed = Math.max(0, now - lastTick);
  const ticks = Math.floor(elapsed / RESOURCE_PRODUCTION_TICK_MS);
  if (ticks <= 0) return 0;
  const rate = getFactionProductionRate('GAR');
  const delta = createEmptyFactionResources();
  RESOURCE_KEYS.forEach((key) => {
    delta[key] = rate[key] * ticks;
  });
  addFactionResources('GAR', delta);
  state.lastResourceTickAt = lastTick + (ticks * RESOURCE_PRODUCTION_TICK_MS);
  return ticks;
}

function resourceDeltaToText(delta) {
  return RESOURCE_KEYS
    .filter((key) => delta[key] > 0)
    .map((key) => `+${delta[key]} ${RESOURCE_LABELS[key]}`)
    .join(' • ');
}

function getShipClassOptions() {
  const faction = getActiveShipyardFaction();
  return Object.entries(SHIP_CLASS_POOL)
    .filter(([, meta]) => (meta.faction || 'GAR') === faction)
    .map(([id, meta]) => ({ id, ...meta }));
}

function getShipClassMeta(classId) {
  return SHIP_CLASS_POOL[classId] || null;
}

function isStationClass(classId) {
  return STATION_CLASS_IDS.has(classId);
}

function getGARControlledPlanets() {
  return state.planets.filter((planet) => planet.owner === 'GAR');
}

function getKUSBuildTargetPlanets() {
  const targets = new Set(KUS_SHIPYARD_PLANET_KEYS);
  return state.planets.filter((planet) => targets.has(normalizePlanetKey(planet.id || planet.name)));
}

function getDefaultShipyardPlanets() {
  const targets = new Set(DEFAULT_SHIPYARD_PLANET_KEYS);
  return state.planets.filter((planet) => targets.has(normalizePlanetKey(planet.id || planet.name)));
}

function getShipyardLocationChoices(classId) {
  const meta = getShipClassMeta(classId);
  if (!meta) return [];
  const faction = getActiveShipyardFaction();
  if (faction === 'KUS') {
    return getKUSBuildTargetPlanets().map((planet) => ({
      ...planet,
      enabled: planet.owner === 'KUS'
    }));
  }
  if (meta.buildLocations === 'anyGARPlanet') {
    return getGARControlledPlanets().map((planet) => ({ ...planet, enabled: true }));
  }
  const allowed = new Set((meta.buildLocations || []).map((name) => normalizePlanetKey(name)));
  return state.planets
    .filter((planet) => allowed.has(normalizePlanetKey(planet.id || planet.name)))
    .map((planet) => ({
      ...planet,
      enabled: planet.owner === 'GAR'
    }));
}

function getAvailableBuildLocations(classId) {
  return getShipyardLocationChoices(classId).filter((planet) => planet.enabled);
}

function canAffordCost(cost) {
  const pool = getFactionResourcePool('GAR');
  return RESOURCE_KEYS.every((key) => (pool[key] || 0) >= (cost?.[key] || 0));
}

function spendResources(cost) {
  if (!canAffordCost(cost)) return false;
  const pool = getFactionResourcePool('GAR');
  RESOURCE_KEYS.forEach((key) => {
    pool[key] -= cost?.[key] || 0;
  });
  return true;
}

function createReadyShipFromBuild(data = {}) {
  const meta = getShipClassMeta(data.classId);
  if (!meta) return null;
  const ship = createShipRecord({
    id: data.id || `ship_${Math.random().toString(36).slice(2, 10)}`,
    classId: data.classId,
    name: data.shipName || meta.displayName,
    faction: data.faction || 'GAR',
    status: 'ready',
    locationPlanetId: data.locationPlanetId || '',
    assignedFleetId: '',
    createdFrom: data.createdFrom || 'shipyard'
  });
  state.ships.push(ship);
  normalizeFleetShipAssignments();
  return ship;
}

function processBuildJobs(now = Date.now()) {
  let changed = false;
  state.buildJobs.forEach((job) => {
    if (job.status !== 'building' || now < job.finishesAt) return;
    const meta = getShipClassMeta(job.classId);
    if (!meta) {
      job.status = 'cancelled';
      changed = true;
      return;
    }
    const ship = createReadyShipFromBuild({
      id: job.producedShipId || `ship_${Math.random().toString(36).slice(2, 10)}`,
      classId: job.classId,
      shipName: job.shipName || meta.displayName,
      faction: job.faction || 'GAR',
      locationPlanetId: job.buildLocationPlanetId,
      createdFrom: 'shipyard'
    });
    if (!ship) return;
    job.producedShipId = ship.id;
    job.status = 'ready';
    changed = true;
  });
  return changed;
}

function enforceStrategicOwnershipRules() {
  let changed = false;
  state.buildJobs.forEach((job) => {
    if (job.status !== 'building') return;
    const planet = planetIndex.get(job.buildLocationPlanetId);
    const requiredOwner = job.faction === 'KUS' ? 'KUS' : 'GAR';
    if (!planet || planet.owner !== requiredOwner) {
      job.status = 'cancelled';
      changed = true;
    }
  });
  state.ships.forEach((ship) => {
    if (!isStationClass(ship.classId)) return;
    const planet = ship.locationPlanetId ? planetIndex.get(ship.locationPlanetId) : null;
    if (planet && planet.owner !== 'GAR' && ship.status !== 'lost') {
      ship.status = 'lost';
      ship.assignedFleetId = '';
      changed = true;
    }
  });
  if (changed) normalizeFleetShipAssignments();
  return changed;
}

function formatDuration(ms) {
  const totalMinutes = Math.max(0, Math.round(ms / 60000));
  const hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  if (hours && minutes) return `${hours}h ${minutes}m`;
  if (hours) return `${hours}h`;
  return `${minutes}m`;
}

  const normalized = normalizeSearchText(text);
  for (const entry of SHIP_CLASS_IMPORT_PATTERNS) {

  }
  return null;

function importTrelloData(payload) {
  const board = Array.isArray(payload?.boards)
    ? payload.boards.find((entry) => normalizeSearchText(entry.name || '').includes('4. flottenkoordination')) || payload.boards[0]
    : payload;
  const lists = Array.isArray(board?.lists) ? board.lists : Array.isArray(payload?.lists) ? payload.lists : [];
  const cards = Array.isArray(board?.cards) ? board.cards : Array.isArray(payload?.cards) ? payload.cards : [];
  const warnings = [];
  const listMap = new Map(lists.map((list) => [list.id, list]));
  const validFleetMap = new Map();
  lists.forEach((list) => {
    const normalizedName = normalizeSearchText(list.name || '');
    if (!normalizedName || TRELLO_EXCLUDED_LISTS.has(normalizedName)) return;
    const existing = state.fleets.find((fleet) => normalizeSearchText(fleet.name) === normalizedName);
    const fleet = existing || createFleetRecord({
      name: list.name,
      commander: parseCommanderFromLabel(list.name),
      faction: 'GAR'
    });
    if (!existing) state.fleets.push(fleet);
    validFleetMap.set(list.id, fleet);
  });
  cards.forEach((card) => {
    if (card.closed) return;
    const fleet = validFleetMap.get(card.idList);
    if (!fleet) return;
    const classId = detectShipClassId(card.name || '');
    if (!classId || !SHIP_CLASS_POOL[classId]) {
      warnings.push(`Unknown ship class: ${card.name}`);
      return;
    }
    const exists = state.ships.some((ship) => normalizeSearchText(ship.name) === normalizeSearchText(card.name) && ship.assignedFleetId === fleet.id);
    if (exists) return;
    state.ships.push(createShipRecord({
      classId,
      name: card.name,
      commander: parseCommanderFromLabel(card.desc || ''),
      faction: 'GAR',
      status: 'active',
      locationPlanetId: fleet.locationPlanetId || fleet.planetId || '',
      assignedFleetId: fleet.id,
      createdFrom: 'trello'
    }));
  });
  state.importWarnings = warnings;
  normalizeFleetShipAssignments();
  saveLocal();
  render({ positions: true, layers: true });
  renderFleetManagementView();
  setStatus(warnings.length ? `Trello-Import abgeschlossen mit ${warnings.length} Warnungen.` : 'Trello-Import abgeschlossen.');
}

function getDefaultRouteDominance(route) {
  const endpoints = Array.isArray(route.planets) && route.planets.length
    ? route.planets
    : [route.a, route.b].filter(Boolean);
  const total = endpoints.length || 1;
  const garCount = endpoints.filter((planet) => planet?.owner === 'GAR').length;
  const kusCount = endpoints.filter((planet) => planet?.owner === 'KUS').length;
  return {
    gar: Math.round((garCount / total) * 100),
    kus: Math.round((kusCount / total) * 100)
  };
}

function getRouteDominance(route) {
  const fallback = getDefaultRouteDominance(route);
  const gar = clamp(Number(fallback.gar) || 0, 0, 100);
  const kus = clamp(Number(fallback.kus) || 0, 0, 100);
  const neutral = Math.max(0, 100 - gar - kus);
  return { gar, kus, neutral };
}

function buildFleetTravelGraph() {
  const graph = new Map();
  tacticalTravelEdges.forEach((edge) => {
    if (!planetIndex.has(edge.startPlanetId) || !planetIndex.has(edge.endPlanetId) || edge.length <= 0) return;
    if (!graph.has(edge.startPlanetId)) graph.set(edge.startPlanetId, []);
    if (!graph.has(edge.endPlanetId)) graph.set(edge.endPlanetId, []);
    graph.get(edge.startPlanetId).push({
      to: edge.endPlanetId,
      edge,
      reversed: false
    });
    graph.get(edge.endPlanetId).push({
      to: edge.startPlanetId,
      edge,
      reversed: true
    });
  });
  return graph;
}

function findFleetTravelPlan(startPlanetId, endPlanetId) {
  if (!startPlanetId || !endPlanetId || startPlanetId === endPlanetId) return null;
  const graph = buildFleetTravelGraph();
  if (!graph.size) return null;
  const startPlanet = planetIndex.get(startPlanetId);
  const endPlanet = planetIndex.get(endPlanetId);
  if (!startPlanet || !endPlanet) return null;
  const resolveGraphAnchor = (planet) => {
    if (graph.has(planet.id)) {
      return { nodeId: planet.id, connector: [] };
    }
    let bestNodeId = null;
    let bestDistance = Infinity;
    graph.forEach((_, nodeId) => {
      const candidate = planetIndex.get(nodeId);
      if (!candidate) return;
      const distance = distanceBetweenPoints(getPlanetDisplayPosition(planet), getPlanetDisplayPosition(candidate));
      if (distance < bestDistance) {
        bestDistance = distance;
        bestNodeId = nodeId;
      }
    });
    if (!bestNodeId) return null;
    const anchorPlanet = planetIndex.get(bestNodeId);
    return {
      nodeId: bestNodeId,
      connector: [getPlanetDisplayPosition(planet), getPlanetDisplayPosition(anchorPlanet)]
    };
  };
  const startAnchor = resolveGraphAnchor(startPlanet);
  const endAnchor = resolveGraphAnchor(endPlanet);
  if (!startAnchor || !endAnchor) return null;
  const graphStartId = startAnchor.nodeId;
  const graphEndId = endAnchor.nodeId;
  if (!graph.has(graphStartId) || !graph.has(graphEndId)) return null;
  const distances = new Map([[graphStartId, 0]]);
  const previous = new Map();
  const queue = new Set(graph.keys());

  while (queue.size) {
    let current = null;
    let currentDistance = Infinity;
    queue.forEach((nodeId) => {
      const value = distances.get(nodeId);
      if (value !== undefined && value < currentDistance) {
        currentDistance = value;
        current = nodeId;
      }
    });
    if (!current) break;
    queue.delete(current);
    if (current === graphEndId) break;
    (graph.get(current) || []).forEach((step) => {
      if (!queue.has(step.to)) return;
      const nextDistance = currentDistance + step.edge.length;
      if (nextDistance < (distances.get(step.to) ?? Infinity)) {
        distances.set(step.to, nextDistance);
        previous.set(step.to, { from: current, step });
      }
    });
  }

  if (graphStartId !== graphEndId && !previous.has(graphEndId)) return null;
  const steps = [];
  let cursor = graphEndId;
  while (cursor !== graphStartId) {
    const entry = previous.get(cursor);
    if (!entry) return null;
    steps.unshift(entry.step);
    cursor = entry.from;
  }

  const points = [];
  if (startAnchor.connector.length) {
    startAnchor.connector.forEach((point, index) => {
      if (index === 0 || distanceBetweenPoints(points[points.length - 1], point) > 0.01) points.push(point);
    });
  }
  steps.forEach((step, index) => {
    const path = step.reversed ? [...step.edge.path].reverse() : step.edge.path;
    path.forEach((point, pointIndex) => {
      if (points.length && pointIndex === 0 && distanceBetweenPoints(points[points.length - 1], point) <= 0.01) return;
      points.push(point);
    });
  });
  if (endAnchor.connector.length) {
    const connector = [...endAnchor.connector].reverse();
    connector.forEach((point) => {
      if (!points.length || distanceBetweenPoints(points[points.length - 1], point) > 0.01) points.push(point);
    });
  }
  if (graphStartId === graphEndId && !points.length) {
    points.push(getPlanetDisplayPosition(startPlanet), getPlanetDisplayPosition(endPlanet));
  }
  return {
    steps,
    points,
    totalLength: polylineLength(points)
  };
}

function upsertFleetMotionRecord(motion) {
  const nextMotion = {
    fleetId: String(motion?.fleetId || '').trim(),
    sourcePlanetId: String(motion?.sourcePlanetId || '').trim(),
    sourcePlanetName: String(motion?.sourcePlanetName || '').trim(),
    targetPlanetId: String(motion?.targetPlanetId || '').trim(),
    targetPlanetName: String(motion?.targetPlanetName || '').trim(),
    startedAtMs: Number(motion?.startedAtMs) || Date.now(),
    durationMs: Math.max(1000, Number(motion?.durationMs) || 0)
  };
  if (!nextMotion.fleetId) return;
  state.fleetMotions = Array.isArray(state.fleetMotions) ? state.fleetMotions.filter((entry) => entry.fleetId !== nextMotion.fleetId) : [];
  state.fleetMotions.push(nextMotion);
}
